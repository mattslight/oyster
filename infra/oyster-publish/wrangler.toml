name = "oyster-publish"
main = "src/worker.ts"
compatibility_date = "2026-04-01"
# nodejs_compat is required by @cloudflare/vitest-pool-workers (the test
# infrastructure needs Node-style APIs inside the Worker runtime). Production
# handlers don't depend on it — they use Web Crypto + standard Web APIs only.
compatibility_flags = ["nodejs_compat"]

# Shared D1 binding — same database_id as oyster-auth so we can read sessions/users
# and own the published_artifacts table inside the same DB. Single source of truth.
[[d1_databases]]
binding = "DB"
database_name = "oyster-auth"
database_id = "44086805-fbfa-4446-8626-126af7e2ec19"

# R2 bucket for published artefact bytes.
[[r2_buckets]]
binding = "ARTIFACTS"
bucket_name = "oyster-artifacts"

# Routes: admin API + public viewer. Both apex and www so the Worker is
# reachable from either origin (matches auth-worker pattern).
[[routes]]
pattern = "oyster.to/api/publish/*"
zone_name = "oyster.to"

[[routes]]
pattern = "www.oyster.to/api/publish/*"
zone_name = "oyster.to"

[[routes]]
pattern = "oyster.to/p/*"
zone_name = "oyster.to"

[[routes]]
pattern = "www.oyster.to/p/*"
zone_name = "oyster.to"

# Origin-isolated public viewer. Same handler as oyster.to/p/* — the host
# split is what gives us cookie/storage isolation between the main app and
# untrusted published content (issue #397).
[[routes]]
pattern = "share.oyster.to/p/*"
zone_name = "oyster.to"

# Rate limiter for password-gate POST attempts. Key = `${ip}:${share_token}`
# so one IP cannot exhaust attempts across all of a publisher's shares.
# Spec: docs/superpowers/specs/2026-05-03-r5-viewer-design.md
[[unsafe.bindings]]
name = "VIEWER_PASSWORD_LIMIT"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 10, period = 60 }

name = "oyster-leaderboard"
main = "src/worker.ts"
compatibility_date = "2026-04-01"

# Bind the D1 database. Run `wrangler d1 create oyster-leaderboard` once,
# then paste the returned database_id here.
[[d1_databases]]
binding = "DB"
database_name = "oyster-leaderboard"
database_id = "REPLACE_ME_AFTER_CREATE"

# Route the Worker at both oyster.to/api/leaderboard and www.oyster.to/api/leaderboard.
[[routes]]
pattern = "oyster.to/api/leaderboard"
zone_name = "oyster.to"

[[routes]]
pattern = "www.oyster.to/api/leaderboard"
zone_name = "oyster.to"

name = "oyster-auth"
main = "src/worker.ts"
compatibility_date = "2026-04-01"

# Bind the D1 database. Run `wrangler d1 create oyster-auth` once,
# then paste the returned database_id here.
[[d1_databases]]
binding = "DB"
database_name = "oyster-auth"
database_id = "44086805-fbfa-4446-8626-126af7e2ec19"

# Auth flow lives under /auth on the apex. Both apex and www are routed
# so the Worker is reachable from either origin (GH Pages 301-redirects
# www → apex, but a direct hit on www still needs to land here).
[[routes]]
pattern = "oyster.to/auth/*"
zone_name = "oyster.to"

[[routes]]
pattern = "www.oyster.to/auth/*"
zone_name = "oyster.to"

# Per-IP rate limit on /auth/magic-link, keyed on cf.connecting_ip.
# namespace_id is local to this Worker — any unused integer works.
# 20 requests per hour matches docs/plans/auth.md.
[[unsafe.bindings]]
name = "MAGIC_LINK_LIMIT"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 20, period = 3600 }

# Non-secret config. Secrets (RESEND_API_KEY, GITHUB_OAUTH_CLIENT_SECRET)
# go via `wrangler secret put`. GITHUB_OAUTH_CLIENT_ID is committed
# in-tree even though the repo is public because (a) it isn't secret
# per OAuth — it's exposed in every redirect URL, and (b) GitHub
# enforces the registered callback URL (oyster.to/auth/github/callback),
# so a fork that grabbed this id can't complete sign-in: GitHub
# redirects to oyster.to, which 400s on the unknown state. The worst
# case for a forker is a confusing dev UX; they should register their
# own OAuth App for local work.
[vars]
FROM_ADDRESS = "noreply@oyster.to"
REPLY_TO = "matthew@slight.me"
GITHUB_OAUTH_CLIENT_ID = "Ov23liGyjoJzH1wyYIwk"

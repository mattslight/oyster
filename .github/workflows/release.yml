name: Release & Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: npm
    # Third-party action versions are pinned to exact tags (not floating @vN majors)
    # so that a compromised or accidentally-published bad release on the same major
    # branch does not land in our CI automatically. Manual bumps for now; revisit
    # once Dependabot/Renovate is configured for this repo.
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6.3.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: |
          cd web && npm ci && cd ..
          cd server && npm ci && cd ..

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: |
          if [[ "$GITHUB_REF_NAME" == *"-beta"* ]]; then
            npm publish --provenance --access public --tag beta
          else
            npm publish --provenance --access public
          fi

      - name: Extract changelog
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Keep a Changelog format: match `## [X.Y.Z]` header, capture until the next `## ` header.
          NOTES=$(awk -v v="$VERSION" 'BEGIN{re="^## \\[" v "\\]"} /^## /{if(found)exit; if($0~re){found=1; next}} found' CHANGELOG.md 2>/dev/null || true)
          if [ -z "$NOTES" ]; then
            NOTES="Release $GITHUB_REF_NAME"
          fi
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3.0.0
        with:
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.notes }}
          generate_release_notes: true

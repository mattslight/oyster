<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Platformer</title>
<link rel="stylesheet" href="../shared/pixel-font.css">
<link rel="stylesheet" href="../shared/cabinet.css">
<link rel="stylesheet" href="../shared/touch.css">
<style>
  /* Platformer-specific styles. Cabinet, pixel font, and touch base styles
     come from ../shared/ — see <link> tags above. */

  /* Per-button colour override: the JUMP button is orange to set it apart
     from the cyan ◀ ▶ movement cluster. */
  .touch-controls .tc-jump {
    width: clamp(72px, 14vw, 100px);
    height: clamp(72px, 14vw, 100px);
    border-color: rgba(255, 132, 0, 0.7);
    color: #ff8800;
    font-size: clamp(14px, 2.6vw, 22px);
  }
  .touch-controls .tc-jump:active,
  .touch-controls .tc-jump.is-pressed {
    background: rgba(255, 132, 0, 0.25);
    border-color: #ff8800;
    color: #fff;
  }

  /* Splash */
  .splash {
    position: absolute;
    inset: 0;
    z-index: 3;
    background: #000;
    font-family: 'Press Start 2P', ui-monospace, monospace;
    color: #fff;
    overflow: hidden;
    animation: splash-poweron 0.55s ease-out;
  }
  .splash.is-hidden {
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
  }
  .splash .boot,
  .splash .splash-main {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 24px;
  }
  .splash .boot {
    gap: clamp(18px, 2.8vw, 28px);
    opacity: 0;
    animation:
      boot-show 0.3s 0.55s forwards,
      boot-flicker 0.18s 0.55s 2 steps(2),
      boot-hide 0.35s 2.5s forwards;
  }
  .splash .splash-main {
    gap: clamp(18px, 3vw, 32px);
    opacity: 0;
    visibility: hidden;
    animation: boot-show 0.45s 2.75s forwards, splash-reveal 0.45s 2.75s forwards;
  }
  @keyframes boot-show { to { opacity: 1; } }
  @keyframes splash-reveal { to { visibility: visible; } }
  @keyframes boot-hide { to { opacity: 0; visibility: hidden; } }
  @keyframes boot-flicker {
    0%, 100% { filter: brightness(1); }
    50% { filter: brightness(2.2) contrast(1.4); transform: translateX(2px); }
  }
  .splash .boot-msg {
    font-size: clamp(10px, 1.6vw, 14px);
    letter-spacing: 0.22em;
    color: #2dd4ff;
    text-shadow: 0 0 8px rgba(45, 212, 255, 0.5);
  }
  .splash .boot-bar {
    width: clamp(180px, 36vw, 360px);
    height: 14px;
    border: 2px solid #2dd4ff;
    padding: 2px;
    box-shadow: 0 0 12px rgba(45, 212, 255, 0.3);
  }
  .splash .boot-bar-fill {
    height: 100%;
    width: 0;
    background: #2dd4ff;
    box-shadow: 0 0 6px #2dd4ff;
    animation: boot-fill 1.9s linear 0.55s forwards;
  }
  @keyframes boot-fill { to { width: 100%; } }
  .splash .boot-pct {
    font-size: clamp(8px, 1.2vw, 11px);
    letter-spacing: 0.18em;
    color: #ffd84a;
  }
  .splash .title {
    font-size: clamp(24px, 5.5vw, 56px);
    letter-spacing: 0.04em;
    line-height: 1.2;
    color: #ffd84a;
    text-shadow:
      3px 3px 0 #ff3aa1,
      6px 6px 0 #2dd4ff,
      0 0 18px rgba(255, 216, 74, 0.45);
  }
  .splash .start {
    font-size: clamp(11px, 2vw, 16px);
    letter-spacing: 0.16em;
    color: #fff;
    animation: arcade-blink 1s steps(1) infinite;
  }
  .splash .controls {
    display: grid;
    grid-template-columns: auto auto;
    gap: 10px 18px;
    font-size: clamp(8px, 1.2vw, 11px);
    letter-spacing: 0.08em;
    color: #b8b8d0;
    margin-top: 6px;
  }
  .splash .controls .key { color: #2dd4ff; text-align: right; }
  .splash .controls .desc { color: #fff; text-align: left; }
  .splash .credit {
    font-size: clamp(7px, 1vw, 9px);
    letter-spacing: 0.2em;
    color: rgba(255, 255, 255, 0.35);
    margin-top: clamp(12px, 2vw, 20px);
  }
  .splash .sound-toggle {
    position: absolute;
    top: clamp(10px, 1.6vw, 18px);
    right: clamp(10px, 1.6vw, 18px);
    z-index: 10;
    background: transparent;
    border: none;
    color: #2dd4ff;
    font-family: 'Press Start 2P', ui-monospace, monospace;
    font-size: clamp(14px, 2vw, 22px);
    line-height: 1;
    padding: 6px 8px;
    cursor: pointer;
    opacity: 0.8;
    transition: opacity 0.15s, color 0.15s;
  }
  .splash .sound-toggle:hover,
  .splash .sound-toggle:focus { opacity: 1; outline: none; }
  @media (max-width: 500px) {
    .splash .sound-toggle { right: auto; left: clamp(10px, 1.6vw, 18px); }
  }
  .splash .sound-toggle.is-muted {
    color: rgba(255, 255, 255, 0.32);
    text-decoration: line-through;
    text-decoration-thickness: 0.12em;
  }
  @media (prefers-reduced-motion: reduce) {
    .splash { animation: none; }
    .splash .boot, .splash .splash-main { animation: boot-show 0.3s forwards; }
    .splash .boot-bar-fill { animation: boot-fill 0.6s linear forwards; }
    .splash .start { animation: none; opacity: 1; }
  }

  /* Game-over / level-complete panel. Same shell for both states; the
     .go-title gets a state class that swaps colour. Verbatim style stack
     lifted from rocket-ship so the phase-5 extraction is a copy.        */
  .gameover {
    position: absolute;
    inset: 0;
    z-index: 4;
    background: rgba(0, 0, 0, 0.88);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-family: 'Press Start 2P', ui-monospace, monospace;
    color: #fff;
    gap: clamp(16px, 2.6vw, 26px);
    padding: 40px 24px;
    animation: splash-poweron 0.3s ease-out;
  }
  .gameover.is-visible { display: flex; }
  .gameover .go-title {
    font-size: clamp(28px, 6.5vw, 60px);
    text-shadow:
      3px 3px 0 #2dd4ff,
      6px 6px 0 #ffd84a,
      0 0 16px rgba(255, 58, 161, 0.45);
  }
  .gameover .go-title.is-loss { color: #ff3aa1; }
  .gameover .go-title.is-win  {
    color: #ffd84a;
    text-shadow:
      3px 3px 0 #ff3aa1,
      6px 6px 0 #2dd4ff,
      0 0 18px rgba(255, 216, 74, 0.45);
  }
  .gameover .go-score {
    font-size: clamp(14px, 2.2vw, 18px);
    color: #ffd84a;
    letter-spacing: 0.18em;
  }
  .gameover .go-hiscore {
    font-size: clamp(9px, 1.3vw, 12px);
    color: #2dd4ff;
    letter-spacing: 0.18em;
    min-height: 14px;
  }
  .gameover .go-prompt {
    font-size: clamp(10px, 1.6vw, 14px);
    letter-spacing: 0.18em;
    color: #fff;
    animation: arcade-blink 1s steps(1) infinite;
  }
  .gameover .go-initials {
    display: flex; flex-direction: column;
    align-items: center; gap: 12px;
    margin-top: 8px;
  }
  .gameover .go-initials-label {
    font-size: clamp(10px, 1.5vw, 13px);
    letter-spacing: 0.2em;
    color: #ff3aa1;
  }
  .gameover .go-initials-slots {
    display: inline-flex;
    gap: 18px;
    font-size: clamp(28px, 5vw, 44px);
    color: #ffd84a;
    text-shadow: 2px 2px 0 #ff3aa1, 4px 4px 0 #2dd4ff;
    letter-spacing: 0.1em;
  }
  .gameover .go-slot {
    display: inline-block;
    min-width: 1ch;
    padding: 0 4px;
    border-bottom: 4px solid rgba(255, 216, 74, 0.3);
  }
  .gameover .go-slot.is-active {
    border-bottom-color: #2dd4ff;
    animation: arcade-blink 0.6s steps(1) infinite;
  }
  .gameover .go-initials-hint {
    font-size: clamp(8px, 1.1vw, 10px);
    letter-spacing: 0.16em;
    color: rgba(255, 255, 255, 0.6);
  }
</style>
</head>
<body>
<script src="../shared/audio.js"></script>
<script src="../shared/touch.js"></script>
<script src="../shared/iframe-host.js"></script>
<audio id="sfx-powerup"   src="../../sfx-powerup.mp3"   preload="auto"></audio>
<audio id="sfx-explosion" src="../../sfx-explosion.mp3" preload="auto"></audio>
<audio id="sfx-lose"      src="../../sfx-lose.mp3"      preload="auto"></audio>
<audio id="sfx-glitch"    src="../../sfx-glitch.mp3"    preload="auto"></audio>
<div class="screen">
  <div class="tube">
    <canvas id="c"></canvas>
    <div class="overlay"></div>
    <div class="vignette"></div>
    <div class="touch-controls" aria-hidden="true">
      <div class="tc-group tc-move">
        <button type="button" class="tc-btn" id="tc-left"  aria-label="Move left"  tabindex="-1">◀</button>
        <button type="button" class="tc-btn" id="tc-right" aria-label="Move right" tabindex="-1">▶</button>
      </div>
      <div class="tc-group tc-fire">
        <button type="button" class="tc-btn tc-jump" id="tc-jump" aria-label="Jump" tabindex="-1">JUMP</button>
      </div>
    </div>
    <div class="gameover" id="gameover" aria-hidden="true">
      <div class="go-title is-loss" id="go-title">GAME OVER</div>
      <div class="go-score">SCORE <span id="go-score-val">0</span></div>
      <div class="go-hiscore" id="go-hiscore"></div>
      <div class="go-prompt" id="go-prompt"><span class="key-only">PRESS ANY KEY TO RESTART</span><span class="touch-only">TAP TO RESTART</span></div>
      <div class="go-initials" id="go-initials" hidden>
        <div class="go-initials-label">NEW HIGH SCORE — ENTER INITIALS</div>
        <div class="go-initials-slots">
          <span class="go-slot is-active" data-slot="0">A</span>
          <span class="go-slot" data-slot="1">A</span>
          <span class="go-slot" data-slot="2">A</span>
        </div>
        <div class="go-initials-hint"><span class="key-only">↑↓ CHANGE · ←→ MOVE · ENTER SAVE</span><span class="touch-only">◀ ▶ LETTER · ▲ NEXT</span></div>
      </div>
    </div>
    <div class="splash" id="splash">
      <div class="boot">
        <div class="boot-msg">SYSTEM BOOT</div>
        <div class="boot-bar"><div class="boot-bar-fill"></div></div>
        <div class="boot-pct">LOADING&hellip;</div>
      </div>
      <div class="splash-main">
        <div class="title-card">
          <div class="title">PLATF<br>ORMER</div>
          <div class="start"><span class="key-only">INSERT COIN TO PLAY</span><span class="touch-only">TAP TO PLAY</span></div>
          <div class="controls">
            <div class="key key-only">← →</div><div class="key touch-only">TAP ◀ ▶</div><div class="desc">MOVE</div>
            <div class="key key-only">SPACE</div><div class="key touch-only">TAP JUMP</div><div class="desc">JUMP</div>
          </div>
          <div class="credit">© OYSTER 2026 — <span class="key-only">PRESS ANY KEY</span><span class="touch-only">TAP TO PLAY</span></div>
        </div>
      </div>
      <button class="sound-toggle" id="sound-toggle" type="button" aria-label="Toggle sound" tabindex="-1">♪</button>
    </div>
  </div>
</div>

<script>
// ============================================
// CANVAS + RESIZE
// ============================================
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() {
  const rect = canvas.getBoundingClientRect();
  W = canvas.width = rect.width;
  H = canvas.height = rect.height;
}
resize();
window.addEventListener('resize', resize);

// ============================================
// INPUT — keys + touch buttons feed the same flags
// ============================================
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
});
window.addEventListener('keyup', e => keys[e.key] = false);

// Touch buttons drive the same key flags as the keyboard, so the rest
// of the input pipeline doesn't care where input came from.
(function () {
  const left  = document.getElementById('tc-left');
  const right = document.getElementById('tc-right');
  const jump  = document.getElementById('tc-jump');
  Arcade.Touch.bind(left,  () => keys['ArrowLeft']  = true, () => keys['ArrowLeft']  = false);
  Arcade.Touch.bind(right, () => keys['ArrowRight'] = true, () => keys['ArrowRight'] = false);
  Arcade.Touch.bind(jump,  () => keys[' ']          = true, () => keys[' ']          = false);
})();

// ============================================
// AUDIO — Web Audio module lives in ../shared/audio.js. Per-game wrappers
// keep call sites readable.
// ============================================
Arcade.Audio.init({
  sfx: {
    'sfx-powerup':   '../../sfx-powerup.mp3',
    'sfx-explosion': '../../sfx-explosion.mp3',
    'sfx-lose':      '../../sfx-lose.mp3',
    'sfx-glitch':    '../../sfx-glitch.mp3',
  },
  mutedKey: 'oyster-platformer-muted',
});
function playJump() { Arcade.Audio.play('sfx-glitch', 0.4); }
function playCoin() { Arcade.Audio.play('sfx-powerup', 0.5); }
function playGoal() { Arcade.Audio.play('sfx-explosion', 0.55); }
function playHurt() { Arcade.Audio.play('sfx-lose', 0.5); }

// Sound toggle on the splash. Audio module owns the persistence; the
// button just reflects + flips state.
(function () {
  const btn = document.getElementById('sound-toggle');
  if (!btn) return;
  function paint() {
    const m = Arcade.Audio.isMuted();
    btn.classList.toggle('is-muted', m);
    btn.setAttribute('aria-pressed', String(m));
  }
  paint();
  ['mousedown','touchstart','pointerdown'].forEach(ev => {
    btn.addEventListener(ev, e => e.stopPropagation(), { passive: true });
  });
  btn.addEventListener('click', e => {
    e.stopPropagation();
    Arcade.Audio.setMuted(!Arcade.Audio.isMuted());
    paint();
  });
})();

// Iframe ↔ host bridge (ESC → close postMessage) self-installs from
// ../shared/iframe-host.js.

// ============================================
// SPLASH — dismiss on any input, unlock audio on same gesture.
// ============================================
const splash = document.getElementById('splash');
const tube = document.querySelector('.tube');
let started = false;
function startGame() {
  if (started) return;
  started = true;
  Arcade.Audio.ensureCtx();
  splash.classList.add('is-hidden');
  if (tube) tube.classList.add('is-ready');
}
window.addEventListener('keydown', e => { if (e.key !== 'Escape') startGame(); });
splash.addEventListener('pointerdown', e => {
  // Ignore taps on the sound toggle.
  if (e.target.closest('.sound-toggle')) return;
  startGame();
});

// ============================================
// LEVEL — tile grid. '.' = empty, '#' = solid, 'S' = spawn marker (treated
// as empty at runtime; only used to derive spawn coords if not given).
// Designed in a string for easy editing; will move to JSON when there are
// multiple levels.
// ============================================
// Test level: 7 step-up platforms — each 3 tiles wide, 3-tile horizontal
// gaps between them, each one row higher than the previous. Tests how
// far the player can reliably jump diagonally up onto the next ledge.
//
// P1 row 11 (1 above ground)  P2 row 10  P3 row 9  P4 row 8
// P5 row 7  P6 row 6  P7 row 5
const LEVEL = {
  width: 60,
  height: 14,
  spawn: { col: 2, row: 12 },
  tiles: [
    '............................................................',
    '............................................................',
    '............................................................',
    '............................................................',
    '............................................................',
    '..........................................###...............',
    '....................................###.....................',
    '..............................###...........................',
    '........................###.................................',
    '..................###.......................................',
    '............###.............................................',
    '......###...................................................',
    '############################################################',
    '############################################################',
  ],
  // One coin centred above each platform (rows are the row immediately
  // above the platform top, so the player picks them up as they land).
  coins: [
    { col:  7, row: 10 },
    { col: 13, row:  9 },
    { col: 19, row:  8 },
    { col: 25, row:  7 },
    { col: 31, row:  6 },
    { col: 37, row:  5 },
  ],
  // Goal flag sits on top of the last platform (row 5, cols 42-44).
  // The flag visual extends ~2 tiles above this anchor.
  goal: { col: 43, row: 5 },
  // Walker enemies pace back and forth on their starting platform. The
  // col/row anchors place the enemy's feet at the top-left of the tile.
  enemies: [
    { col: 13, row: 10, type: 'walker' },
    { col: 25, row:  8, type: 'walker' },
  ],
};
function tileAt(col, row) {
  if (col < 0 || row < 0 || col >= LEVEL.width || row >= LEVEL.height) {
    // Treat horizontal out-of-bounds as solid wall; below as void (death).
    return (col < 0 || col >= LEVEL.width) ? '#' : '.';
  }
  return LEVEL.tiles[row][col];
}
function isSolid(col, row) { return tileAt(col, row) === '#'; }

// ============================================
// SCALING — derive a tile size in screen pixels from the canvas height so
// the level always fills the viewport vertically. Player size scales with
// the tile size. Recomputed on resize.
// ============================================
let TILE_PX = 32;
let PLAYER_W = 28;
let PLAYER_H = 40;
let ENEMY_W = 28;
let ENEMY_H = 28;
const PLAYER_W_FRAC = 0.85;
const PLAYER_H_FRAC = 1.25;
const ENEMY_W_FRAC = 0.85;
const ENEMY_H_FRAC = 0.85;

function recomputeScale() {
  TILE_PX = Math.max(16, Math.floor(H / LEVEL.height));
  PLAYER_W = Math.round(TILE_PX * PLAYER_W_FRAC);
  PLAYER_H = Math.round(TILE_PX * PLAYER_H_FRAC);
  ENEMY_W = Math.round(TILE_PX * ENEMY_W_FRAC);
  ENEMY_H = Math.round(TILE_PX * ENEMY_H_FRAC);
}
recomputeScale();

// Movement tuning (in screen px / frame at 60fps).
// Peak jump = JUMP_VEL^2 / (2 * GRAVITY) ≈ 141 px ≈ 2.35 tiles at typical
// scale, so the player can comfortably land on 2-tile-high platforms.
const MOVE_ACCEL = 0.75;
const MOVE_MAX = 5.0;
const FRICTION = 0.82;
const GRAVITY = 0.6;
const JUMP_VEL = -13;
const JUMP_CUT = 0.4;
const COYOTE_MS = 100;
const JUMP_BUFFER_MS = 130;

const player = {
  x: 0, y: 0,            // world pixels, top-left
  vx: 0, vy: 0,
  facing: 1,
  grounded: false,
  lastGroundedAt: -Infinity,
  jumpPressedAt: -Infinity,
  jumpHeld: false,
  invulnAt: -Infinity,   // last time a hit was taken
};

const cam = { x: 0 };

// Run-level state.
const MAX_LIVES = 3;
const LEVEL_COMPLETE_GRACE_MS = 600;
const GAME_OVER_GRACE_MS = 600;
const INVULN_MS = 1200;            // post-hit invulnerability window
const ENEMY_SPEED_FRAC = 0.04;     // per-tile / frame; ENEMY_SPEED computed below

let score = 0;
let lives = MAX_LIVES;
const coinsCollected = new Set();
let levelComplete = false;
let levelCompleteAt = 0;
let gameOver = false;
let gameOverAt = 0;
const enemies = [];

function aabbOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
}

function initEnemies() {
  enemies.length = 0;
  const speed = Math.max(1.2, TILE_PX * ENEMY_SPEED_FRAC * 60 / 60);
  for (const e of LEVEL.enemies) {
    enemies.push({
      x: e.col * TILE_PX + (TILE_PX - ENEMY_W) / 2,
      y: e.row * TILE_PX - ENEMY_H,
      vx: -speed,
      alive: true,
      squashAt: 0,
    });
  }
}

// Full restart: lives, score, coins, enemies, player position. Called from
// the splash, after game-over, and after level-complete.
function resetRun() {
  score = 0;
  lives = MAX_LIVES;
  coinsCollected.clear();
  levelComplete = false; levelCompleteAt = 0;
  gameOver = false; gameOverAt = 0;
  initEnemies();
  resetPlayer();
}

// Lose a life but keep score and coin progress. If lives drop to 0 the
// run ends and the game-over overlay takes over.
function hurtPlayer() {
  const now = performance.now();
  if (now - player.invulnAt < INVULN_MS) return;
  lives--;
  player.invulnAt = now;
  playHurt();
  if (lives <= 0) {
    gameOver = true;
    gameOverAt = now;
    return;
  }
  // Mid-run respawn — back to spawn but keep score + coins.
  player.x = LEVEL.spawn.col * TILE_PX + (TILE_PX - PLAYER_W) / 2;
  player.y = LEVEL.spawn.row * TILE_PX - PLAYER_H;
  player.vx = 0; player.vy = 0;
  cam.x = 0;
}

function resetPlayer() {
  player.x = LEVEL.spawn.col * TILE_PX + (TILE_PX - PLAYER_W) / 2;
  player.y = LEVEL.spawn.row * TILE_PX - PLAYER_H;
  player.vx = 0;
  player.vy = 0;
  player.facing = 1;
  player.grounded = true;
  player.lastGroundedAt = performance.now();
  player.jumpPressedAt = -Infinity;
  player.jumpHeld = false;
  cam.x = 0;
}
resetRun();

window.addEventListener('resize', () => {
  // Preserve the player's tile-space position across the rescale, then
  // re-snap. Avoids dropping them into the floor or off the bottom on
  // viewport changes. Enemies snap back to their spawn — rare and benign.
  const wasCol = (player.x + PLAYER_W / 2) / TILE_PX;
  const wasRow = (player.y + PLAYER_H) / TILE_PX;
  recomputeScale();
  initEnemies();
  player.x = wasCol * TILE_PX - PLAYER_W / 2;
  player.y = wasRow * TILE_PX - PLAYER_H;
  player.vx = 0;
  player.vy = 0;
});

// ============================================
// COLLISION — axis-separated AABB vs tile grid. Move X, resolve X.
// Move Y, resolve Y. Standard pattern; avoids the "stick in corner" bug
// you get from a combined sweep.
// ============================================
function resolveX(dx) {
  player.x += dx;
  if (dx === 0) return;
  const top = Math.floor(player.y / TILE_PX);
  const bottom = Math.floor((player.y + PLAYER_H - 1) / TILE_PX);
  if (dx > 0) {
    const right = Math.floor((player.x + PLAYER_W - 1) / TILE_PX);
    for (let row = top; row <= bottom; row++) {
      if (isSolid(right, row)) {
        player.x = right * TILE_PX - PLAYER_W;
        player.vx = 0;
        return;
      }
    }
  } else {
    const left = Math.floor(player.x / TILE_PX);
    for (let row = top; row <= bottom; row++) {
      if (isSolid(left, row)) {
        player.x = (left + 1) * TILE_PX;
        player.vx = 0;
        return;
      }
    }
  }
}
function resolveY(dy) {
  player.y += dy;
  if (dy === 0) return;
  const left = Math.floor(player.x / TILE_PX);
  const right = Math.floor((player.x + PLAYER_W - 1) / TILE_PX);
  if (dy > 0) {
    const bottom = Math.floor((player.y + PLAYER_H - 1) / TILE_PX);
    for (let col = left; col <= right; col++) {
      if (isSolid(col, bottom)) {
        player.y = bottom * TILE_PX - PLAYER_H;
        player.vy = 0;
        player.grounded = true;
        player.lastGroundedAt = performance.now();
        return;
      }
    }
    player.grounded = false;
  } else {
    const top = Math.floor(player.y / TILE_PX);
    for (let col = left; col <= right; col++) {
      if (isSolid(col, top)) {
        player.y = (top + 1) * TILE_PX;
        player.vy = 0;
        return;
      }
    }
  }
}

let prevJump = false;
function update() {
  const now = performance.now();

  // Level complete / game over: freeze gameplay, wait for an input. Grace
  // window prevents the gesture that ended the run from also restarting.
  if (levelComplete || gameOver) {
    const since = now - (levelComplete ? levelCompleteAt : gameOverAt);
    const graceMs = levelComplete ? LEVEL_COMPLETE_GRACE_MS : GAME_OVER_GRACE_MS;
    if (since > graceMs) {
      const anyAction =
        keys[' '] || keys['ArrowUp'] || keys['w'] || keys['W'] ||
        keys['ArrowLeft'] || keys['ArrowRight'] || keys['a'] || keys['d'] ||
        keys['A'] || keys['D'] || keys['Enter'];
      if (anyAction) resetRun();
    }
    return;
  }

  // Horizontal input
  const left = keys['ArrowLeft'] || keys['a'] || keys['A'];
  const right = keys['ArrowRight'] || keys['d'] || keys['D'];
  if (left && !right) { player.vx -= MOVE_ACCEL; player.facing = -1; }
  else if (right && !left) { player.vx += MOVE_ACCEL; player.facing = 1; }
  else { player.vx *= FRICTION; if (Math.abs(player.vx) < 0.05) player.vx = 0; }
  player.vx = Math.max(-MOVE_MAX, Math.min(MOVE_MAX, player.vx));

  // Jump input — edges for press / release
  const jumpDown = !!(keys[' '] || keys['ArrowUp'] || keys['w'] || keys['W']);
  const jumpJustPressed  =  jumpDown && !prevJump;
  const jumpJustReleased = !jumpDown &&  prevJump;
  if (jumpJustPressed) player.jumpPressedAt = now;
  player.jumpHeld = jumpDown;
  prevJump = jumpDown;

  // Coyote + buffered jump
  const canCoyote = (now - player.lastGroundedAt) <= COYOTE_MS;
  const bufferedJump = (now - player.jumpPressedAt) <= JUMP_BUFFER_MS;
  if (bufferedJump && (player.grounded || canCoyote)) {
    player.vy = JUMP_VEL;
    player.grounded = false;
    player.jumpPressedAt = -Infinity;
    player.lastGroundedAt = -Infinity;
    playJump();
  }

  // Variable height — cut once on the release edge while rising. Gravity
  // takes over normally afterward.
  if (jumpJustReleased && player.vy < 0) player.vy *= JUMP_CUT;

  // Gravity
  player.vy += GRAVITY;
  if (player.vy > 16) player.vy = 16;

  // Integrate with tile collision (X then Y)
  resolveX(player.vx);
  resolveY(player.vy);

  // Death by falling below the level → lose a life (keep score + coins).
  if (player.y > LEVEL.height * TILE_PX + 200) {
    hurtPlayer();
    return;
  }

  // Enemies — walker AI. Each frame: advance vx, then reverse if the next
  // step would walk into a wall or off the edge of the current platform.
  for (let i = 0; i < enemies.length; i++) {
    const e = enemies[i];
    if (!e.alive) continue;
    e.x += e.vx;
    // Wall check: tile at the leading face, vertical centre.
    const leadX = e.vx > 0 ? e.x + ENEMY_W : e.x;
    const wallCol = Math.floor(leadX / TILE_PX);
    const wallRow = Math.floor((e.y + ENEMY_H * 0.5) / TILE_PX);
    if (isSolid(wallCol, wallRow)) {
      e.vx = -e.vx;
      // Push out of the wall by one px so we don't re-trigger next frame.
      e.x += e.vx > 0 ? 1 : -1;
      continue;
    }
    // Edge check: tile directly below the leading foot. Walker reverses
    // rather than walking off the platform.
    const footCol = Math.floor(leadX / TILE_PX);
    const footRow = Math.floor((e.y + ENEMY_H + 2) / TILE_PX);
    if (!isSolid(footCol, footRow)) {
      e.vx = -e.vx;
    }
  }

  // Player vs enemy. Stomp from above kills the enemy and bounces the
  // player; touch from any other angle costs a life (gated by invuln).
  for (let i = 0; i < enemies.length; i++) {
    const e = enemies[i];
    if (!e.alive) continue;
    if (!aabbOverlap(player.x, player.y, PLAYER_W, PLAYER_H, e.x, e.y, ENEMY_W, ENEMY_H)) continue;
    const playerBottom = player.y + PLAYER_H;
    const stomping = player.vy > 1 && (playerBottom - e.y) < ENEMY_H * 0.6;
    if (stomping) {
      e.alive = false;
      e.squashAt = now;
      player.vy = -8;          // small pop off the squashed enemy
      score += 50;
      playSfx('sfx-glitch', 0.45);
    } else {
      hurtPlayer();
      // Knock the player back a little so they don't immediately re-hit.
      const dir = player.x + PLAYER_W * 0.5 < e.x + ENEMY_W * 0.5 ? -1 : 1;
      player.vx = dir * 4;
      player.vy = -6;
      break;
    }
  }

  // Coin pickups — small AABB centred on the coin tile.
  for (let i = 0; i < LEVEL.coins.length; i++) {
    if (coinsCollected.has(i)) continue;
    const c = LEVEL.coins[i];
    const cw = TILE_PX * 0.6;
    const cx = c.col * TILE_PX + (TILE_PX - cw) / 2;
    const cy = c.row * TILE_PX + (TILE_PX - cw) / 2;
    if (aabbOverlap(player.x, player.y, PLAYER_W, PLAYER_H, cx, cy, cw, cw)) {
      coinsCollected.add(i);
      score += 10;
      playCoin();
    }
  }

  // Goal flag — collision box covers the pole + flag (2 tiles tall, anchored
  // at the goal column on row 5 = top of the last platform).
  {
    const g = LEVEL.goal;
    const gx = g.col * TILE_PX;
    const gy = (g.row - 2) * TILE_PX;
    const gw = TILE_PX * 0.8;
    const gh = TILE_PX * 2;
    if (aabbOverlap(player.x, player.y, PLAYER_W, PLAYER_H, gx, gy, gw, gh)) {
      levelComplete = true;
      levelCompleteAt = now;
      playGoal();
    }
  }

  // Camera — track player with a soft trailing follow. Player sits around
  // 40% from the left edge once at speed. Clamp to level bounds.
  const targetX = player.x - W * 0.4;
  cam.x += (targetX - cam.x) * 0.15;
  const maxCamX = Math.max(0, LEVEL.width * TILE_PX - W);
  if (cam.x < 0) cam.x = 0;
  if (cam.x > maxCamX) cam.x = maxCamX;
}

// ============================================
// RENDER
// ============================================
function drawTile(col, row) {
  const x = Math.round(col * TILE_PX - cam.x);
  const y = Math.round(row * TILE_PX);
  // Skip tiles fully outside the viewport (tile is at most TILE_PX px wide).
  if (x + TILE_PX < 0 || x > W) return;
  // Solid ground tile — brown body, lighter top edge, cyan highlight pixel row.
  ctx.fillStyle = '#3b2f1a';
  ctx.fillRect(x, y, TILE_PX, TILE_PX);
  const topOpen = !isSolid(col, row - 1);
  if (topOpen) {
    ctx.fillStyle = '#5a4a2a';
    ctx.fillRect(x, y, TILE_PX, Math.max(4, Math.floor(TILE_PX * 0.18)));
    ctx.fillStyle = '#2dd4ff';
    ctx.fillRect(x, y, TILE_PX, 1);
  }
  // Inner outline for that pixel-y chunky look
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.fillRect(x + TILE_PX - 2, y, 2, TILE_PX);
  ctx.fillRect(x, y + TILE_PX - 2, TILE_PX, 2);
}

function drawEnemy(e, t) {
  const x = Math.round(e.x - cam.x);
  const y = Math.round(e.y);
  if (x + ENEMY_W < -8 || x > W + 8) return;
  if (!e.alive) {
    // Squashed: half height, fades out over 250ms then despawns visually.
    const age = t - e.squashAt;
    if (age > 250) return;
    const alpha = 1 - age / 250;
    ctx.fillStyle = `rgba(140, 60, 30, ${alpha})`;
    ctx.fillRect(x, y + ENEMY_H * 0.55, ENEMY_W, ENEMY_H * 0.45);
    return;
  }
  // Walking wobble — small vertical bob with a faster cadence.
  const wob = Math.round(Math.sin(t * 0.014) * 1);
  ctx.fillStyle = '#8c3c1e';
  ctx.fillRect(x, y + wob, ENEMY_W, ENEMY_H);
  ctx.fillStyle = '#5a2010';
  ctx.fillRect(x, y + ENEMY_H * 0.7 + wob, ENEMY_W, ENEMY_H * 0.3);
  // Eyes — sclera + pupil; pupil shifts in the direction of motion.
  const eyeS = Math.max(3, Math.floor(ENEMY_W * 0.18));
  const eyeY = y + Math.floor(ENEMY_H * 0.22) + wob;
  const eye1X = x + Math.floor(ENEMY_W * 0.18);
  const eye2X = x + ENEMY_W - eyeS - Math.floor(ENEMY_W * 0.18);
  ctx.fillStyle = '#fff';
  ctx.fillRect(eye1X, eyeY, eyeS, eyeS);
  ctx.fillRect(eye2X, eyeY, eyeS, eyeS);
  ctx.fillStyle = '#000';
  const pupilSize = Math.max(2, Math.floor(eyeS * 0.5));
  const pupilOff = e.vx > 0 ? eyeS - pupilSize : 0;
  ctx.fillRect(eye1X + pupilOff, eyeY + Math.floor(eyeS * 0.3), pupilSize, pupilSize);
  ctx.fillRect(eye2X + pupilOff, eyeY + Math.floor(eyeS * 0.3), pupilSize, pupilSize);
}

function drawCoin(col, row, t) {
  const cx = col * TILE_PX + TILE_PX / 2 - cam.x;
  const cy = row * TILE_PX + TILE_PX / 2 + Math.sin(t * 0.006 + col) * 3;
  if (cx + TILE_PX < 0 || cx - TILE_PX > W) return;
  const r = TILE_PX * 0.28;
  ctx.fillStyle = '#c79b00';
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#ffd84a';
  ctx.beginPath(); ctx.arc(cx, cy, r * 0.82, 0, Math.PI * 2); ctx.fill();
  // Inner vertical bar = classic arcade coin face
  ctx.fillStyle = '#c79b00';
  ctx.fillRect(cx - 1, cy - r * 0.5, 2, r);
}

function drawGoal(t) {
  const g = LEVEL.goal;
  const poleX = g.col * TILE_PX + TILE_PX / 2 - cam.x;
  const poleTop = (g.row - 2) * TILE_PX;
  const poleBot = g.row * TILE_PX;
  if (poleX < -TILE_PX * 2 || poleX > W + TILE_PX * 2) return;
  // Pole
  ctx.fillStyle = '#fff';
  ctx.fillRect(poleX - 2, poleTop, 4, poleBot - poleTop);
  // Knob
  ctx.fillStyle = '#ffd84a';
  ctx.beginPath(); ctx.arc(poleX, poleTop - 2, 6, 0, Math.PI * 2); ctx.fill();
  // Flag (waving)
  const wave = Math.sin(t * 0.005) * 3;
  const flagW = TILE_PX * 0.9;
  ctx.fillStyle = '#2dd4ff';
  ctx.beginPath();
  ctx.moveTo(poleX + 2, poleTop + 4);
  ctx.lineTo(poleX + flagW + wave, poleTop + TILE_PX * 0.35);
  ctx.lineTo(poleX + 2, poleTop + TILE_PX * 0.7);
  ctx.closePath();
  ctx.fill();
}

function drawHUD() {
  const size = Math.max(10, Math.floor(TILE_PX * 0.35));
  ctx.font = `${size}px 'Press Start 2P', ui-monospace, monospace`;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  const pad = Math.max(10, Math.floor(TILE_PX * 0.3));
  const label = `SCORE ${String(score).padStart(3, '0')}`;
  // Drop shadow for legibility against any background
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillText(label, pad + 2, pad + 2);
  ctx.fillStyle = '#ffd84a';
  ctx.fillText(label, pad, pad);

  // Lives — small pink squares to the right of the score; faded for lost.
  const iconSize = Math.max(8, Math.floor(size * 0.85));
  const iconY = pad + Math.floor((size - iconSize) / 2);
  const labelW = ctx.measureText(label).width;
  const iconStartX = pad + labelW + 20;
  for (let i = 0; i < MAX_LIVES; i++) {
    const ix = iconStartX + i * (iconSize + 5);
    ctx.fillStyle = i < lives ? '#ff3aa1' : 'rgba(255,58,161,0.22)';
    ctx.fillRect(ix, iconY, iconSize, iconSize);
  }
}

function drawGameOver(t) {
  ctx.fillStyle = 'rgba(0,0,0,0.78)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const titleSize = Math.max(28, Math.floor(TILE_PX * 1.0));
  ctx.font = `${titleSize}px 'Press Start 2P', ui-monospace, monospace`;
  ctx.fillStyle = '#2dd4ff'; ctx.fillText('GAME OVER', W / 2 + 6, H / 2 - 60 + 6);
  ctx.fillStyle = '#ffd84a'; ctx.fillText('GAME OVER', W / 2 + 3, H / 2 - 60 + 3);
  ctx.fillStyle = '#ff3aa1'; ctx.fillText('GAME OVER', W / 2,     H / 2 - 60);

  const scoreSize = Math.max(14, Math.floor(TILE_PX * 0.4));
  ctx.font = `${scoreSize}px 'Press Start 2P', ui-monospace, monospace`;
  ctx.fillStyle = '#ffd84a';
  ctx.fillText(`SCORE ${String(score).padStart(3, '0')}`, W / 2, H / 2 + 10);

  if (t - gameOverAt > GAME_OVER_GRACE_MS && Math.floor(t / 500) % 2 === 0) {
    const promptSize = Math.max(11, Math.floor(TILE_PX * 0.3));
    ctx.font = `${promptSize}px 'Press Start 2P', ui-monospace, monospace`;
    ctx.fillStyle = '#fff';
    ctx.fillText('PRESS ANY KEY TO RESTART', W / 2, H / 2 + 60);
  }
}

function drawLevelComplete(t) {
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const titleSize = Math.max(24, Math.floor(TILE_PX * 0.9));
  ctx.font = `${titleSize}px 'Press Start 2P', ui-monospace, monospace`;
  // Shadow stack matching the splash title (yellow/magenta/cyan)
  ctx.fillStyle = '#2dd4ff'; ctx.fillText('LEVEL COMPLETE', W / 2 + 6, H / 2 - 60 + 6);
  ctx.fillStyle = '#ff3aa1'; ctx.fillText('LEVEL COMPLETE', W / 2 + 3, H / 2 - 60 + 3);
  ctx.fillStyle = '#ffd84a'; ctx.fillText('LEVEL COMPLETE', W / 2,     H / 2 - 60);

  const scoreSize = Math.max(14, Math.floor(TILE_PX * 0.4));
  ctx.font = `${scoreSize}px 'Press Start 2P', ui-monospace, monospace`;
  ctx.fillStyle = '#ffd84a';
  ctx.fillText(`SCORE ${String(score).padStart(3, '0')}`, W / 2, H / 2 + 10);

  // Blinking prompt; only shown after the grace window.
  if (t - levelCompleteAt > LEVEL_COMPLETE_GRACE_MS && Math.floor(t / 500) % 2 === 0) {
    const promptSize = Math.max(11, Math.floor(TILE_PX * 0.3));
    ctx.font = `${promptSize}px 'Press Start 2P', ui-monospace, monospace`;
    ctx.fillStyle = '#fff';
    ctx.fillText('PRESS ANY KEY TO PLAY AGAIN', W / 2, H / 2 + 60);
  }
}

function draw() {
  const t = performance.now();

  // Sky
  ctx.fillStyle = '#1a1535';
  ctx.fillRect(0, 0, W, H);

  // Parallax stars — drift slower than the camera (factor 0.3) for depth.
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  for (let i = 0; i < 80; i++) {
    const baseX = (i * 73) % (LEVEL.width * TILE_PX);
    const baseY = (i * 137) % Math.max(1, LEVEL.height * TILE_PX - 80);
    const sx = baseX - cam.x * 0.3;
    const sy = baseY;
    const wrapped = ((sx % W) + W) % W;
    ctx.fillRect(wrapped, sy, 2, 2);
  }

  // Visible tile range
  const c0 = Math.max(0, Math.floor(cam.x / TILE_PX));
  const c1 = Math.min(LEVEL.width - 1, Math.ceil((cam.x + W) / TILE_PX));
  for (let row = 0; row < LEVEL.height; row++) {
    for (let col = c0; col <= c1; col++) {
      if (isSolid(col, row)) drawTile(col, row);
    }
  }

  // Coins (skip collected)
  for (let i = 0; i < LEVEL.coins.length; i++) {
    if (coinsCollected.has(i)) continue;
    drawCoin(LEVEL.coins[i].col, LEVEL.coins[i].row, t);
  }

  // Goal flag
  drawGoal(t);

  // Enemies (alive on top so squashed remnants render under)
  for (let i = 0; i < enemies.length; i++) {
    if (!enemies[i].alive) drawEnemy(enemies[i], t);
  }
  for (let i = 0; i < enemies.length; i++) {
    if (enemies[i].alive) drawEnemy(enemies[i], t);
  }

  // Player — skip every other 80ms slice during invuln for a classic flash.
  const invulnLeft = player.invulnAt + INVULN_MS - t;
  const flashOff = invulnLeft > 0 && Math.floor(t / 80) % 2 === 0;
  if (!flashOff) {
    const px = Math.round(player.x - cam.x);
    const py = Math.round(player.y);
    ctx.fillStyle = '#ff3aa1';
    ctx.fillRect(px, py, PLAYER_W, PLAYER_H);
    ctx.fillStyle = '#ffd84a';
    ctx.fillRect(px + 4, py + Math.floor(PLAYER_H * 0.15), PLAYER_W - 8, Math.max(3, Math.floor(PLAYER_H * 0.1)));
    // Eye
    ctx.fillStyle = '#0a0a0a';
    const eyeS = Math.max(4, Math.floor(PLAYER_W * 0.22));
    const eyeX = player.facing > 0 ? px + PLAYER_W - eyeS - 4 : px + 4;
    const eyeY = py + Math.floor(PLAYER_H * 0.35);
    ctx.fillRect(eyeX, eyeY, eyeS, eyeS);
    ctx.fillStyle = '#fff';
    ctx.fillRect(eyeX + Math.floor(eyeS * 0.4), eyeY + Math.floor(eyeS * 0.3), 2, 2);
  }

  // HUD on top
  drawHUD();

  // End-state overlays
  if (levelComplete) drawLevelComplete(t);
  else if (gameOver) drawGameOver(t);
}

function loop() {
  if (started) {
    update();
    draw();
  }
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>

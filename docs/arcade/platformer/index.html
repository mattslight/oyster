<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Platformer</title>
<style>
  @font-face {
    font-family: 'Press Start 2P';
    font-style: normal;
    font-weight: 400;
    font-display: swap;
    src: url('../../assets/PressStart2P-Regular.ttf') format('truetype');
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    margin: 0;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
  }

  /* Cabinet — bezel + tube + CRT overlay + vignette. Verbatim from rocket-ship. */
  .screen {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background:
      linear-gradient(180deg, #2a2724 0%, #1a1815 50%, #100e0c 100%);
    padding: 22px;
    box-shadow:
      inset 0 1px 0 rgba(255, 255, 255, 0.06),
      inset 0 -2px 6px rgba(0, 0, 0, 0.6);
  }
  .tube {
    position: relative;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    border-radius: 36px;
    box-shadow:
      inset 0 0 0 1px rgba(0, 0, 0, 0.9),
      inset 0 0 40px rgba(0, 0, 0, 0.85),
      0 0 0 2px rgba(0, 0, 0, 0.7);
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
    filter: contrast(1.02) brightness(1.18) saturate(1.3);
  }

  /* Touch controls — only on coarse pointers, only after splash dismisses */
  .touch-controls {
    position: absolute;
    inset: auto 0 0 0;
    display: none;
    justify-content: space-between;
    align-items: flex-end;
    padding: clamp(14px, 3vw, 28px);
    pointer-events: none;
    z-index: 6;
  }
  .tube.is-ready .touch-controls { display: flex; }
  @media (hover: hover) and (pointer: fine) {
    .touch-controls { display: none !important; }
  }
  .touch-controls .tc-group {
    display: flex;
    gap: clamp(10px, 2vw, 16px);
    pointer-events: none;
  }
  .touch-controls .tc-btn {
    pointer-events: auto;
    width: clamp(56px, 11vw, 80px);
    height: clamp(56px, 11vw, 80px);
    border-radius: 12px;
    border: 2px solid rgba(45, 212, 255, 0.6);
    background: rgba(0, 0, 0, 0.35);
    color: #2dd4ff;
    font-family: 'Press Start 2P', ui-monospace, monospace;
    font-size: clamp(20px, 4vw, 30px);
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    transition: background 0.08s, border-color 0.08s;
  }
  .touch-controls .tc-btn:active,
  .touch-controls .tc-btn.is-pressed {
    background: rgba(45, 212, 255, 0.25);
    border-color: #2dd4ff;
    color: #fff;
  }
  .touch-controls .tc-jump {
    width: clamp(72px, 14vw, 100px);
    height: clamp(72px, 14vw, 100px);
    border-color: rgba(255, 132, 0, 0.7);
    color: #ff8800;
    font-size: clamp(14px, 2.6vw, 22px);
  }
  .touch-controls .tc-jump:active,
  .touch-controls .tc-jump.is-pressed {
    background: rgba(255, 132, 0, 0.25);
    border-color: #ff8800;
    color: #fff;
  }

  .touch-only { display: none; }
  @media (pointer: coarse) {
    .key-only { display: none; }
    .touch-only { display: revert; }
  }

  /* CRT scanlines + RGB sub-pixel overlay */
  .overlay {
    height: 100%;
    left: 0;
    position: absolute;
    top: 0;
    width: 100%;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  .overlay::after {
    position: absolute;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-image: url('../../assets/crt.png');
    background-repeat: no-repeat;
    background-size: 100% 100%;
    content: "";
    opacity: 0.55;
  }
  .vignette {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(ellipse at center,
      transparent 55%,
      rgba(0, 0, 0, 0.22) 80%,
      rgba(0, 0, 0, 0.45) 100%);
    pointer-events: none;
    z-index: 11;
    border-radius: 36px;
  }
  .overlay::before {
    position: absolute;
    top: 0; left: 0; bottom: 0; right: 0;
    content: " ";
    background:
      linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.35) 50%),
      linear-gradient(90deg, rgba(255,0,0,0.1), rgba(0,255,0,0.04), rgba(0,0,255,0.1));
    z-index: 2;
    background-size: 100% 3px, 3px 100%;
    pointer-events: none;
  }

  /* Hide canvas until splash dismissed */
  .tube canvas { visibility: hidden; }
  .tube.is-ready canvas { visibility: visible; }

  /* Splash */
  .splash {
    position: absolute;
    inset: 0;
    z-index: 3;
    background: #000;
    font-family: 'Press Start 2P', ui-monospace, monospace;
    color: #fff;
    overflow: hidden;
    animation: splash-poweron 0.55s ease-out;
  }
  .splash.is-hidden {
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
  }
  @keyframes splash-poweron {
    0%   { transform: scale(1, 0.005); filter: brightness(3.5); }
    55%  { transform: scale(1, 0.005); filter: brightness(3.5); }
    80%  { transform: scale(1, 1); filter: brightness(2); }
    100% { transform: scale(1, 1); filter: brightness(1); }
  }
  .splash .boot,
  .splash .splash-main {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 24px;
  }
  .splash .boot {
    gap: clamp(18px, 2.8vw, 28px);
    opacity: 0;
    animation:
      boot-show 0.3s 0.55s forwards,
      boot-flicker 0.18s 0.55s 2 steps(2),
      boot-hide 0.35s 2.5s forwards;
  }
  .splash .splash-main {
    gap: clamp(18px, 3vw, 32px);
    opacity: 0;
    visibility: hidden;
    animation: boot-show 0.45s 2.75s forwards, splash-reveal 0.45s 2.75s forwards;
  }
  @keyframes boot-show { to { opacity: 1; } }
  @keyframes splash-reveal { to { visibility: visible; } }
  @keyframes boot-hide { to { opacity: 0; visibility: hidden; } }
  @keyframes boot-flicker {
    0%, 100% { filter: brightness(1); }
    50% { filter: brightness(2.2) contrast(1.4); transform: translateX(2px); }
  }
  .splash .boot-msg {
    font-size: clamp(10px, 1.6vw, 14px);
    letter-spacing: 0.22em;
    color: #2dd4ff;
    text-shadow: 0 0 8px rgba(45, 212, 255, 0.5);
  }
  .splash .boot-bar {
    width: clamp(180px, 36vw, 360px);
    height: 14px;
    border: 2px solid #2dd4ff;
    padding: 2px;
    box-shadow: 0 0 12px rgba(45, 212, 255, 0.3);
  }
  .splash .boot-bar-fill {
    height: 100%;
    width: 0;
    background: #2dd4ff;
    box-shadow: 0 0 6px #2dd4ff;
    animation: boot-fill 1.9s linear 0.55s forwards;
  }
  @keyframes boot-fill { to { width: 100%; } }
  .splash .boot-pct {
    font-size: clamp(8px, 1.2vw, 11px);
    letter-spacing: 0.18em;
    color: #ffd84a;
  }
  .splash .title {
    font-size: clamp(24px, 5.5vw, 56px);
    letter-spacing: 0.04em;
    line-height: 1.2;
    color: #ffd84a;
    text-shadow:
      3px 3px 0 #ff3aa1,
      6px 6px 0 #2dd4ff,
      0 0 18px rgba(255, 216, 74, 0.45);
  }
  .splash .start {
    font-size: clamp(11px, 2vw, 16px);
    letter-spacing: 0.16em;
    color: #fff;
    animation: arcade-blink 1s steps(1) infinite;
  }
  @keyframes arcade-blink {
    0%, 50% { opacity: 1; }
    51%, 100% { opacity: 0; }
  }
  .splash .controls {
    display: grid;
    grid-template-columns: auto auto;
    gap: 10px 18px;
    font-size: clamp(8px, 1.2vw, 11px);
    letter-spacing: 0.08em;
    color: #b8b8d0;
    margin-top: 6px;
  }
  .splash .controls .key { color: #2dd4ff; text-align: right; }
  .splash .controls .desc { color: #fff; text-align: left; }
  .splash .credit {
    font-size: clamp(7px, 1vw, 9px);
    letter-spacing: 0.2em;
    color: rgba(255, 255, 255, 0.35);
    margin-top: clamp(12px, 2vw, 20px);
  }
  .splash .sound-toggle {
    position: absolute;
    top: clamp(10px, 1.6vw, 18px);
    right: clamp(10px, 1.6vw, 18px);
    z-index: 10;
    background: transparent;
    border: none;
    color: #2dd4ff;
    font-family: 'Press Start 2P', ui-monospace, monospace;
    font-size: clamp(14px, 2vw, 22px);
    line-height: 1;
    padding: 6px 8px;
    cursor: pointer;
    opacity: 0.8;
    transition: opacity 0.15s, color 0.15s;
  }
  .splash .sound-toggle:hover,
  .splash .sound-toggle:focus { opacity: 1; outline: none; }
  @media (max-width: 500px) {
    .splash .sound-toggle { right: auto; left: clamp(10px, 1.6vw, 18px); }
  }
  .splash .sound-toggle.is-muted {
    color: rgba(255, 255, 255, 0.32);
    text-decoration: line-through;
    text-decoration-thickness: 0.12em;
  }
  @media (prefers-reduced-motion: reduce) {
    .splash { animation: none; }
    .splash .boot, .splash .splash-main { animation: boot-show 0.3s forwards; }
    .splash .boot-bar-fill { animation: boot-fill 0.6s linear forwards; }
    .splash .start { animation: none; opacity: 1; }
  }
</style>
</head>
<body>
<audio id="sfx-powerup" src="../../sfx-powerup.mp3" preload="auto"></audio>
<audio id="sfx-lose"    src="../../sfx-lose.mp3"    preload="auto"></audio>
<div class="screen">
  <div class="tube">
    <canvas id="c"></canvas>
    <div class="overlay"></div>
    <div class="vignette"></div>
    <div class="touch-controls" aria-hidden="true">
      <div class="tc-group tc-move">
        <button type="button" class="tc-btn" id="tc-left"  aria-label="Move left"  tabindex="-1">◀</button>
        <button type="button" class="tc-btn" id="tc-right" aria-label="Move right" tabindex="-1">▶</button>
      </div>
      <div class="tc-group tc-fire">
        <button type="button" class="tc-btn tc-jump" id="tc-jump" aria-label="Jump" tabindex="-1">JUMP</button>
      </div>
    </div>
    <div class="splash" id="splash">
      <div class="boot">
        <div class="boot-msg">SYSTEM BOOT</div>
        <div class="boot-bar"><div class="boot-bar-fill"></div></div>
        <div class="boot-pct">LOADING&hellip;</div>
      </div>
      <div class="splash-main">
        <div class="title-card">
          <div class="title">PLATF<br>ORMER</div>
          <div class="start"><span class="key-only">INSERT COIN TO PLAY</span><span class="touch-only">TAP TO PLAY</span></div>
          <div class="controls">
            <div class="key key-only">← →</div><div class="key touch-only">TAP ◀ ▶</div><div class="desc">MOVE</div>
            <div class="key key-only">SPACE</div><div class="key touch-only">TAP JUMP</div><div class="desc">JUMP</div>
          </div>
          <div class="credit">© OYSTER 2026 — <span class="key-only">PRESS ANY KEY</span><span class="touch-only">TAP TO PLAY</span></div>
        </div>
      </div>
      <button class="sound-toggle" id="sound-toggle" type="button" aria-label="Toggle sound" tabindex="-1">♪</button>
    </div>
  </div>
</div>

<script>
// ============================================
// CANVAS + RESIZE
// ============================================
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() {
  const rect = canvas.getBoundingClientRect();
  W = canvas.width = rect.width;
  H = canvas.height = rect.height;
}
resize();
window.addEventListener('resize', resize);

// ============================================
// INPUT — keys + touch buttons feed the same flags
// ============================================
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
});
window.addEventListener('keyup', e => keys[e.key] = false);

(function bindTouchButtons() {
  const left  = document.getElementById('tc-left');
  const right = document.getElementById('tc-right');
  const jump  = document.getElementById('tc-jump');
  function bind(btn, onDown, onUp) {
    if (!btn) return;
    const down = e => { e.preventDefault(); btn.classList.add('is-pressed'); onDown(); };
    const up   = e => { if (e) e.preventDefault(); btn.classList.remove('is-pressed'); onUp(); };
    btn.addEventListener('pointerdown', down);
    btn.addEventListener('pointerup', up);
    btn.addEventListener('pointercancel', up);
    btn.addEventListener('pointerleave', up);
    ['pointerdown','mousedown','touchstart'].forEach(ev => {
      btn.addEventListener(ev, e => e.stopPropagation(), { passive: false });
    });
  }
  bind(left,  () => keys['ArrowLeft']  = true, () => keys['ArrowLeft']  = false);
  bind(right, () => keys['ArrowRight'] = true, () => keys['ArrowRight'] = false);
  bind(jump,  () => keys[' ']          = true, () => keys[' ']          = false);
})();

// ============================================
// AUDIO — Web Audio decoded once; <audio> fallback for first frames.
// Copied verbatim from rocket-ship.html (the gesture-coupled iOS unlock matters).
// ============================================
const SFX_FILES = {
  'sfx-powerup': '../../sfx-powerup.mp3',
  'sfx-lose':    '../../sfx-lose.mp3',
};
var audioCtx = null;
var sfxMasterGain = null;
var sfxBuffers = {};
var sfxMuted = false;
function ensureAudioCtx() {
  try {
    if (!audioCtx) {
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) return null;
      audioCtx = new Ctx();
      sfxMasterGain = audioCtx.createGain();
      sfxMasterGain.gain.value = sfxMuted ? 0 : 1;
      sfxMasterGain.connect(audioCtx.destination);
      Object.entries(SFX_FILES).forEach(async ([id, src]) => {
        try {
          const resp = await fetch(src);
          const arr = await resp.arrayBuffer();
          sfxBuffers[id] = await audioCtx.decodeAudioData(arr);
        } catch (_) {}
      });
    }
    if (audioCtx.state === 'suspended') audioCtx.resume().catch(() => {});
  } catch (_) {}
  return audioCtx;
}
function setSfxMuted(m) {
  sfxMuted = m;
  if (sfxMasterGain) sfxMasterGain.gain.value = m ? 0 : 1;
}
function playSfx(id, volume = 0.6) {
  const c = audioCtx;
  const buf = c && sfxBuffers[id];
  if (!c || !buf) {
    const el = document.getElementById(id);
    if (!el) return;
    el.volume = sfxMuted ? 0 : volume;
    try { el.currentTime = 0; el.play().catch(() => {}); } catch (_) {}
    return;
  }
  const src = c.createBufferSource();
  src.buffer = buf;
  const gain = c.createGain();
  gain.gain.value = volume;
  src.connect(gain).connect(sfxMasterGain);
  try { src.start(0); } catch (_) {}
}
function playJump() { playSfx('sfx-powerup', 0.5); }
function playHurt() { playSfx('sfx-lose', 0.5); }

// ============================================
// SOUND TOGGLE — persists muted state to localStorage
// ============================================
(function () {
  const SOUND_KEY = 'oyster-platformer-muted';
  const btn = document.getElementById('sound-toggle');
  if (!btn) return;
  function setMuted(m) {
    document.querySelectorAll('audio').forEach(a => { a.muted = m; });
    setSfxMuted(m);
    btn.classList.toggle('is-muted', m);
    btn.setAttribute('aria-pressed', String(m));
    try { localStorage.setItem(SOUND_KEY, m ? '1' : '0'); } catch (_) {}
  }
  let muted = false;
  try { muted = localStorage.getItem(SOUND_KEY) === '1'; } catch (_) {}
  setMuted(muted);
  ['mousedown','touchstart','pointerdown'].forEach(ev => {
    btn.addEventListener(ev, e => e.stopPropagation(), { passive: true });
  });
  btn.addEventListener('click', e => {
    e.stopPropagation();
    setMuted(!btn.classList.contains('is-muted'));
  });
})();

// ============================================
// IFRAME HOST BRIDGE — ESC posts close to parent; mark body for host CSS hooks.
// ============================================
if (window.self !== window.top) document.body.classList.add('is-embedded');
window.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    try { window.parent.postMessage({ type: 'arcade-close' }, '*'); } catch (_) {}
    // Back-compat with the existing rocket-ship close handler in docs/index.html
    try { window.parent.postMessage({ type: 'oyster-rocket-close' }, '*'); } catch (_) {}
  }
});

// ============================================
// SPLASH — dismiss on any input, unlock audio on same gesture.
// ============================================
const splash = document.getElementById('splash');
const tube = document.querySelector('.tube');
let started = false;
function startGame() {
  if (started) return;
  started = true;
  ensureAudioCtx();
  splash.classList.add('is-hidden');
  if (tube) tube.classList.add('is-ready');
}
window.addEventListener('keydown', e => { if (e.key !== 'Escape') startGame(); });
splash.addEventListener('pointerdown', e => {
  // Ignore taps on the sound toggle.
  if (e.target.closest('.sound-toggle')) return;
  startGame();
});

// ============================================
// LEVEL — tile grid. '.' = empty, '#' = solid, 'S' = spawn marker (treated
// as empty at runtime; only used to derive spawn coords if not given).
// Designed in a string for easy editing; will move to JSON when there are
// multiple levels.
// ============================================
// Test level: 7 step-up platforms — each 3 tiles wide, 3-tile horizontal
// gaps between them, each one row higher than the previous. Tests how
// far the player can reliably jump diagonally up onto the next ledge.
//
// P1 row 11 (1 above ground)  P2 row 10  P3 row 9  P4 row 8
// P5 row 7  P6 row 6  P7 row 5
const LEVEL = {
  width: 60,
  height: 14,
  spawn: { col: 2, row: 12 },
  tiles: [
    '............................................................',
    '............................................................',
    '............................................................',
    '............................................................',
    '............................................................',
    '..........................................###...............',
    '....................................###.....................',
    '..............................###...........................',
    '........................###.................................',
    '..................###.......................................',
    '............###.............................................',
    '......###...................................................',
    '############################################################',
    '############################################################',
  ],
};
function tileAt(col, row) {
  if (col < 0 || row < 0 || col >= LEVEL.width || row >= LEVEL.height) {
    // Treat horizontal out-of-bounds as solid wall; below as void (death).
    return (col < 0 || col >= LEVEL.width) ? '#' : '.';
  }
  return LEVEL.tiles[row][col];
}
function isSolid(col, row) { return tileAt(col, row) === '#'; }

// ============================================
// SCALING — derive a tile size in screen pixels from the canvas height so
// the level always fills the viewport vertically. Player size scales with
// the tile size. Recomputed on resize.
// ============================================
let TILE_PX = 32;
let PLAYER_W = 28;
let PLAYER_H = 40;
const PLAYER_W_FRAC = 0.85;
const PLAYER_H_FRAC = 1.25;

function recomputeScale() {
  TILE_PX = Math.max(16, Math.floor(H / LEVEL.height));
  PLAYER_W = Math.round(TILE_PX * PLAYER_W_FRAC);
  PLAYER_H = Math.round(TILE_PX * PLAYER_H_FRAC);
}
recomputeScale();

// Movement tuning (in screen px / frame at 60fps).
// Peak jump = JUMP_VEL^2 / (2 * GRAVITY) ≈ 141 px ≈ 2.35 tiles at typical
// scale, so the player can comfortably land on 2-tile-high platforms.
const MOVE_ACCEL = 0.75;
const MOVE_MAX = 5.0;
const FRICTION = 0.82;
const GRAVITY = 0.6;
const JUMP_VEL = -13;
const JUMP_CUT = 0.4;
const COYOTE_MS = 100;
const JUMP_BUFFER_MS = 130;

const player = {
  x: 0, y: 0,            // world pixels, top-left
  vx: 0, vy: 0,
  facing: 1,
  grounded: false,
  lastGroundedAt: -Infinity,
  jumpPressedAt: -Infinity,
  jumpHeld: false,
};

const cam = { x: 0 };

function resetPlayer() {
  player.x = LEVEL.spawn.col * TILE_PX + (TILE_PX - PLAYER_W) / 2;
  player.y = LEVEL.spawn.row * TILE_PX - PLAYER_H;
  player.vx = 0;
  player.vy = 0;
  player.facing = 1;
  player.grounded = true;
  player.lastGroundedAt = performance.now();
  player.jumpPressedAt = -Infinity;
  player.jumpHeld = false;
  cam.x = 0;
}
resetPlayer();

window.addEventListener('resize', () => {
  // Preserve the player's tile-space position across the rescale, then
  // re-snap. Avoids dropping them into the floor or off the bottom on
  // viewport changes.
  const wasCol = (player.x + PLAYER_W / 2) / TILE_PX;
  const wasRow = (player.y + PLAYER_H) / TILE_PX;
  recomputeScale();
  player.x = wasCol * TILE_PX - PLAYER_W / 2;
  player.y = wasRow * TILE_PX - PLAYER_H;
  player.vx = 0;
  player.vy = 0;
});

// ============================================
// COLLISION — axis-separated AABB vs tile grid. Move X, resolve X.
// Move Y, resolve Y. Standard pattern; avoids the "stick in corner" bug
// you get from a combined sweep.
// ============================================
function resolveX(dx) {
  player.x += dx;
  if (dx === 0) return;
  const top = Math.floor(player.y / TILE_PX);
  const bottom = Math.floor((player.y + PLAYER_H - 1) / TILE_PX);
  if (dx > 0) {
    const right = Math.floor((player.x + PLAYER_W - 1) / TILE_PX);
    for (let row = top; row <= bottom; row++) {
      if (isSolid(right, row)) {
        player.x = right * TILE_PX - PLAYER_W;
        player.vx = 0;
        return;
      }
    }
  } else {
    const left = Math.floor(player.x / TILE_PX);
    for (let row = top; row <= bottom; row++) {
      if (isSolid(left, row)) {
        player.x = (left + 1) * TILE_PX;
        player.vx = 0;
        return;
      }
    }
  }
}
function resolveY(dy) {
  player.y += dy;
  if (dy === 0) return;
  const left = Math.floor(player.x / TILE_PX);
  const right = Math.floor((player.x + PLAYER_W - 1) / TILE_PX);
  if (dy > 0) {
    const bottom = Math.floor((player.y + PLAYER_H - 1) / TILE_PX);
    for (let col = left; col <= right; col++) {
      if (isSolid(col, bottom)) {
        player.y = bottom * TILE_PX - PLAYER_H;
        player.vy = 0;
        player.grounded = true;
        player.lastGroundedAt = performance.now();
        return;
      }
    }
    player.grounded = false;
  } else {
    const top = Math.floor(player.y / TILE_PX);
    for (let col = left; col <= right; col++) {
      if (isSolid(col, top)) {
        player.y = (top + 1) * TILE_PX;
        player.vy = 0;
        return;
      }
    }
  }
}

let prevJump = false;
function update() {
  const now = performance.now();

  // Horizontal input
  const left = keys['ArrowLeft'] || keys['a'] || keys['A'];
  const right = keys['ArrowRight'] || keys['d'] || keys['D'];
  if (left && !right) { player.vx -= MOVE_ACCEL; player.facing = -1; }
  else if (right && !left) { player.vx += MOVE_ACCEL; player.facing = 1; }
  else { player.vx *= FRICTION; if (Math.abs(player.vx) < 0.05) player.vx = 0; }
  player.vx = Math.max(-MOVE_MAX, Math.min(MOVE_MAX, player.vx));

  // Jump input — edge-triggered buffer
  const jumpDown = !!(keys[' '] || keys['ArrowUp'] || keys['w'] || keys['W']);
  if (jumpDown && !prevJump) player.jumpPressedAt = now;
  player.jumpHeld = jumpDown;
  prevJump = jumpDown;

  // Coyote + buffered jump
  const canCoyote = (now - player.lastGroundedAt) <= COYOTE_MS;
  const bufferedJump = (now - player.jumpPressedAt) <= JUMP_BUFFER_MS;
  if (bufferedJump && (player.grounded || canCoyote)) {
    player.vy = JUMP_VEL;
    player.grounded = false;
    player.jumpPressedAt = -Infinity;
    player.lastGroundedAt = -Infinity;
    playJump();
  }

  // Variable height — cut upward velocity if jump released while rising
  if (!player.jumpHeld && player.vy < 0) {
    player.vy *= JUMP_CUT;
    if (player.vy > -1) player.vy = -1;
  }

  // Gravity
  player.vy += GRAVITY;
  if (player.vy > 16) player.vy = 16;

  // Integrate with tile collision (X then Y)
  resolveX(player.vx);
  resolveY(player.vy);

  // Death by falling below the level → respawn at spawn point.
  if (player.y > LEVEL.height * TILE_PX + 200) {
    playHurt();
    resetPlayer();
  }

  // Camera — track player with a soft trailing follow. Player sits around
  // 40% from the left edge once at speed. Clamp to level bounds.
  const targetX = player.x - W * 0.4;
  cam.x += (targetX - cam.x) * 0.15;
  const maxCamX = Math.max(0, LEVEL.width * TILE_PX - W);
  if (cam.x < 0) cam.x = 0;
  if (cam.x > maxCamX) cam.x = maxCamX;
}

// ============================================
// RENDER
// ============================================
function drawTile(col, row) {
  const x = Math.round(col * TILE_PX - cam.x);
  const y = Math.round(row * TILE_PX);
  // Skip tiles fully outside the viewport (tile is at most TILE_PX px wide).
  if (x + TILE_PX < 0 || x > W) return;
  // Solid ground tile — brown body, lighter top edge, cyan highlight pixel row.
  ctx.fillStyle = '#3b2f1a';
  ctx.fillRect(x, y, TILE_PX, TILE_PX);
  const topOpen = !isSolid(col, row - 1);
  if (topOpen) {
    ctx.fillStyle = '#5a4a2a';
    ctx.fillRect(x, y, TILE_PX, Math.max(4, Math.floor(TILE_PX * 0.18)));
    ctx.fillStyle = '#2dd4ff';
    ctx.fillRect(x, y, TILE_PX, 1);
  }
  // Inner outline for that pixel-y chunky look
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.fillRect(x + TILE_PX - 2, y, 2, TILE_PX);
  ctx.fillRect(x, y + TILE_PX - 2, TILE_PX, 2);
}

function draw() {
  // Sky
  ctx.fillStyle = '#1a1535';
  ctx.fillRect(0, 0, W, H);

  // Parallax stars — drift slower than the camera (factor 0.3) for depth.
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  for (let i = 0; i < 80; i++) {
    const baseX = (i * 73) % (LEVEL.width * TILE_PX);
    const baseY = (i * 137) % Math.max(1, LEVEL.height * TILE_PX - 80);
    const sx = baseX - cam.x * 0.3;
    const sy = baseY;
    const wrapped = ((sx % W) + W) % W;
    ctx.fillRect(wrapped, sy, 2, 2);
  }

  // Visible tile range
  const c0 = Math.max(0, Math.floor(cam.x / TILE_PX));
  const c1 = Math.min(LEVEL.width - 1, Math.ceil((cam.x + W) / TILE_PX));
  for (let row = 0; row < LEVEL.height; row++) {
    for (let col = c0; col <= c1; col++) {
      if (isSolid(col, row)) drawTile(col, row);
    }
  }

  // Player
  const px = Math.round(player.x - cam.x);
  const py = Math.round(player.y);
  ctx.fillStyle = '#ff3aa1';
  ctx.fillRect(px, py, PLAYER_W, PLAYER_H);
  ctx.fillStyle = '#ffd84a';
  ctx.fillRect(px + 4, py + Math.floor(PLAYER_H * 0.15), PLAYER_W - 8, Math.max(3, Math.floor(PLAYER_H * 0.1)));
  // Eye
  ctx.fillStyle = '#0a0a0a';
  const eyeS = Math.max(4, Math.floor(PLAYER_W * 0.22));
  const eyeX = player.facing > 0 ? px + PLAYER_W - eyeS - 4 : px + 4;
  const eyeY = py + Math.floor(PLAYER_H * 0.35);
  ctx.fillRect(eyeX, eyeY, eyeS, eyeS);
  ctx.fillStyle = '#fff';
  ctx.fillRect(eyeX + Math.floor(eyeS * 0.4), eyeY + Math.floor(eyeS * 0.3), 2, 2);
}

function loop() {
  if (started) {
    update();
    draw();
  }
  requestAnimationFrame(loop);
}
loop();
</script>

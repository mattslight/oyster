<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oyster Arcade</title>
<meta name="description" content="A small arcade of games made by Oyster.">
<link rel="stylesheet" href="shared/pixel-font.css">
<link rel="stylesheet" href="shared/cabinet.css">
<link rel="stylesheet" href="shared/touch.css">
<style>
  /* Override the shared cabinet to stack a marquee strip on top of the
     screen. The cabinet evokes the top half of an arcade machine: marquee
     panel up top, CRT tube below. */
  .screen {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .tube { height: auto; flex: 1 1 auto; }

  .marquee {
    flex: 0 0 auto;
    height: clamp(64px, 12vh, 120px);
    background: linear-gradient(180deg, #1a1815 0%, #0d0b09 100%);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    padding: 14px 24px;
    box-shadow:
      inset 0 0 0 1px rgba(255, 255, 255, 0.04),
      inset 0 0 40px rgba(0, 0, 0, 0.85),
      0 3px 0 #100e0c;
  }
  /* Marquee bulbs along the top edge — old arcade lighting strip. */
  .marquee::before {
    content: '';
    position: absolute;
    top: 7px; left: 14px; right: 14px;
    height: 4px;
    background-image: repeating-linear-gradient(
      90deg,
      #ffd84a 0,
      #ffd84a 4px,
      transparent 4px,
      transparent 14px
    );
    border-radius: 2px;
    opacity: 0.45;
  }
  .marquee-text {
    font-family: 'Press Start 2P', ui-monospace, monospace;
    font-size: clamp(22px, 5.5vw, 52px);
    color: #ffd84a;
    letter-spacing: 0.16em;
    text-shadow:
      3px 3px 0 #ff3aa1,
      6px 6px 0 #2dd4ff,
      0 0 30px rgba(255, 216, 74, 0.55);
  }

  .arcade-main {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: clamp(24px, 4vw, 48px);
    font-family: 'Press Start 2P', ui-monospace, monospace;
    color: #fff;
    text-align: center;
    gap: clamp(14px, 2.5vw, 28px);
    z-index: 1;
    animation: splash-poweron 0.55s ease-out;
  }

  /* Preview stage — only the selected game's pixel-art thumbnail is shown. */
  .game-preview-stage {
    position: relative;
    width: clamp(140px, 22vw, 220px);
    height: clamp(140px, 22vw, 220px);
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0, 0, 0, 0.5);
    border-radius: 12px;
    box-shadow: inset 0 0 32px rgba(0, 0, 0, 0.75);
    overflow: hidden;
  }
  .game-preview {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 12px;
  }
  .game-preview.is-active { display: flex; }
  .game-preview svg {
    width: 80%;
    height: 80%;
    image-rendering: pixelated;
    shape-rendering: crispEdges;
  }

  /* Horizontal game selector — current is wrapped in [ … ]; others dimmed.
     Wrap on narrow screens so a long list never overflows the cabinet. */
  .game-selector {
    display: flex;
    align-items: center;
    gap: clamp(14px, 3vw, 28px);
    max-width: 100%;
  }
  .game-list {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    gap: clamp(14px, 3vw, 28px);
    list-style: none;
    padding: 0; margin: 0;
  }
  .game-item {
    appearance: none;
    background: transparent;
    border: none;
    font: inherit;
    font-size: clamp(13px, 2.2vw, 20px);
    letter-spacing: 0.1em;
    color: rgba(255, 255, 255, 0.42);
    padding: 4px 6px;
    cursor: pointer;
    white-space: nowrap;
    transition: color 0.12s, transform 0.12s;
    -webkit-tap-highlight-color: transparent;
  }
  .game-item:hover { color: rgba(255, 216, 74, 0.7); }
  .game-item:focus-visible { outline: none; color: #ffd84a; }
  .game-item.is-selected {
    color: #ffd84a;
    transform: translateY(-1px);
  }
  .game-item.is-selected::before {
    content: '[ ';
    color: #2dd4ff;
    letter-spacing: 0;
  }
  .game-item.is-selected::after {
    content: ' ]';
    color: #2dd4ff;
    letter-spacing: 0;
  }
  .select-arrow {
    appearance: none;
    background: transparent;
    border: none;
    font: inherit;
    font-family: 'Press Start 2P', ui-monospace, monospace;
    font-size: clamp(16px, 2.8vw, 24px);
    color: rgba(45, 212, 255, 0.55);
    cursor: pointer;
    padding: 4px 8px;
    -webkit-tap-highlight-color: transparent;
    transition: color 0.12s, transform 0.12s;
  }
  .select-arrow:hover,
  .select-arrow:focus-visible {
    color: #2dd4ff;
    outline: none;
    transform: scale(1.1);
  }

  .game-hi {
    font-size: clamp(9px, 1.4vw, 12px);
    letter-spacing: 0.18em;
    color: #ff3aa1;
    min-height: 14px;
  }
  .game-hi .hi-val { color: #ffd84a; }
  .game-hi .hi-initials { color: #2dd4ff; }
  .game-prompt {
    font-size: clamp(10px, 1.6vw, 14px);
    letter-spacing: 0.18em;
    color: #fff;
    animation: arcade-blink 1s steps(1) infinite;
  }
  .arcade-credit {
    position: absolute;
    bottom: clamp(8px, 1.4vw, 14px);
    left: 0; right: 0;
    text-align: center;
    font-size: clamp(7px, 1vw, 9px);
    letter-spacing: 0.22em;
    color: rgba(255, 255, 255, 0.4);
    font-family: 'Press Start 2P', ui-monospace, monospace;
    z-index: 1;
  }
  .arcade-credit a { color: #2dd4ff; text-decoration: none; }
  .arcade-credit a:hover { text-decoration: underline; }

  /* PLAY touch button — wider than the directional buttons, orange to
     distinguish from the cyan ◀ ▶ cluster. */
  .touch-controls .tc-select {
    width: auto;
    min-width: clamp(80px, 16vw, 120px);
    height: clamp(56px, 11vw, 80px);
    padding: 0 clamp(14px, 2.5vw, 22px);
    border-color: rgba(255, 132, 0, 0.7);
    color: #ff8800;
    font-size: clamp(12px, 2vw, 18px);
    letter-spacing: 0.12em;
  }
  .touch-controls .tc-select:active,
  .touch-controls .tc-select.is-pressed {
    background: rgba(255, 132, 0, 0.25);
    border-color: #ff8800;
    color: #fff;
  }

  @media (prefers-reduced-motion: reduce) {
    .arcade-main { animation: none; }
    .game-prompt { animation: none; opacity: 1; }
    .game-item, .select-arrow { transition: none; }
  }
</style>
</head>
<body>
<div class="screen">
  <div class="marquee">
    <div class="marquee-text">OYSTER ARCADE</div>
  </div>
  <div class="tube is-ready">
    <div class="overlay"></div>
    <div class="vignette"></div>
    <main class="arcade-main">
      <div class="game-preview-stage">
        <!-- ROCKET SHIP preview -->
        <div class="game-preview" data-preview-for="rocket-ship">
          <svg viewBox="0 0 22 30" aria-hidden="true">
            <rect x="10" y="0" width="2" height="2" fill="#ff4444"/>
            <rect x="9"  y="2" width="4" height="2" fill="#ff4444"/>
            <rect x="8"  y="4" width="6" height="2" fill="#ff4444"/>
            <rect x="7"  y="6"  width="8"  height="8" fill="#ffffff"/>
            <rect x="13" y="6"  width="2"  height="8" fill="#c8c8c8"/>
            <rect x="6"  y="14" width="10" height="4" fill="#ffffff"/>
            <rect x="14" y="14" width="2"  height="4" fill="#c8c8c8"/>
            <rect x="9"  y="8"  width="4" height="4" fill="#2dd4ff"/>
            <rect x="10" y="9"  width="2" height="1" fill="#aef0ff"/>
            <rect x="6"  y="16" width="10" height="1" fill="#ff3aa1"/>
            <rect x="3"  y="14" width="3" height="2" fill="#ff4444"/>
            <rect x="2"  y="16" width="4" height="2" fill="#ff4444"/>
            <rect x="0"  y="18" width="4" height="2" fill="#ff4444"/>
            <rect x="16" y="14" width="3" height="2" fill="#ff4444"/>
            <rect x="16" y="16" width="4" height="2" fill="#ff4444"/>
            <rect x="18" y="18" width="4" height="2" fill="#ff4444"/>
            <rect x="7"  y="18" width="8" height="2" fill="#555555"/>
            <rect x="8"  y="20" width="6" height="1" fill="#333333"/>
            <rect x="8"  y="21" width="6" height="2" fill="#ffd84a"/>
            <rect x="9"  y="23" width="4" height="2" fill="#ff8800"/>
            <rect x="9"  y="25" width="4" height="2" fill="#ffd84a"/>
            <rect x="10" y="27" width="2" height="2" fill="#ffffff"/>
          </svg>
        </div>
        <!-- PLATFORMER preview -->
        <div class="game-preview" data-preview-for="platformer">
          <svg viewBox="0 0 32 32" aria-hidden="true">
            <rect width="32" height="32" fill="#1a1535"/>
            <rect x="4"  y="3" width="1" height="1" fill="#fff"/>
            <rect x="11" y="6" width="1" height="1" fill="#fff"/>
            <rect x="22" y="2" width="1" height="1" fill="#fff"/>
            <rect x="27" y="7" width="1" height="1" fill="#fff"/>
            <rect x="0" y="26" width="32" height="6" fill="#3b2f1a"/>
            <rect x="0" y="26" width="32" height="1" fill="#5a4a2a"/>
            <rect x="0" y="26" width="32" height="1" fill="#2dd4ff" opacity="0.65"/>
            <rect x="13" y="18" width="7" height="3" fill="#3b2f1a"/>
            <rect x="13" y="18" width="7" height="1" fill="#2dd4ff" opacity="0.6"/>
            <rect x="4" y="18" width="5" height="8" fill="#ff3aa1"/>
            <rect x="5" y="20" width="3" height="1" fill="#ffd84a"/>
            <rect x="7" y="21" width="1" height="1" fill="#0a0a0a"/>
            <circle cx="16" cy="14" r="1.6" fill="#ffd84a"/>
            <circle cx="16" cy="14" r="0.7" fill="#c79b00"/>
            <rect x="28" y="14" width="1" height="12" fill="#fff"/>
            <polygon points="29,15 32,16.5 29,18" fill="#2dd4ff"/>
          </svg>
        </div>
      </div>
      <div class="game-selector">
        <button class="select-arrow" id="sel-prev" type="button" aria-label="Previous game" tabindex="-1">◀</button>
        <ul class="game-list" id="game-list" role="listbox" aria-label="Games">
          <!-- populated by JS so it's trivially extensible -->
        </ul>
        <button class="select-arrow" id="sel-next" type="button" aria-label="Next game" tabindex="-1">▶</button>
      </div>
      <div class="game-hi" id="game-hi">&nbsp;</div>
      <div class="game-prompt">
        <span class="key-only">← → SELECT  ·  ENTER TO PLAY</span>
        <span class="touch-only">TAP A GAME TO PLAY</span>
      </div>
    </main>
    <div class="touch-controls" aria-hidden="true">
      <div class="tc-group">
        <button type="button" class="tc-btn" id="tc-left"  aria-label="Previous game" tabindex="-1">◀</button>
        <button type="button" class="tc-btn" id="tc-right" aria-label="Next game"     tabindex="-1">▶</button>
      </div>
      <div class="tc-group">
        <button type="button" class="tc-btn tc-select" id="tc-select" aria-label="Play selected game" tabindex="-1">PLAY</button>
      </div>
    </div>
    <div class="arcade-credit">© OYSTER 2026 · <a href="https://oyster.to/">oyster.to</a></div>
  </div>
</div>

<script src="shared/touch.js"></script>
<script src="shared/leaderboard.js"></script>
<script>
// Game catalogue. Add new entries here — UI and routing are data-driven.
const GAMES = [
  { id: 'rocket-ship', name: 'ROCKET SHIP', url: 'https://oyster.to/rocket-ship.html' },
  { id: 'platformer',  name: 'PLATFORMER',  url: 'platformer/' },
];

let sel = 0;

function paint() {
  document.querySelectorAll('.game-list .game-item').forEach((el, i) => {
    const active = i === sel;
    el.classList.toggle('is-selected', active);
    el.setAttribute('aria-selected', String(active));
  });
  document.querySelectorAll('.game-preview').forEach(el => {
    el.classList.toggle('is-active', el.dataset.previewFor === GAMES[sel].id);
  });
  paintHi();
}

function paintHi() {
  const game = GAMES[sel].id;
  Arcade.Leaderboard.init({ game, max: 10 });
  const top = Arcade.Leaderboard.getHighScore();
  const el = document.getElementById('game-hi');
  if (!top) { el.textContent = ' '; return; }
  el.innerHTML =
    'HIGH SCORE <span class="hi-val">' + String(top.score).padStart(3, '0') + '</span> ' +
    '<span class="hi-initials">' + (top.initials || '---') + '</span>';
}

function next()   { sel = (sel + 1) % GAMES.length; paint(); }
function prev()   { sel = (sel - 1 + GAMES.length) % GAMES.length; paint(); }
function launch() { window.location.href = GAMES[sel].url; }

// Build the list. Click on a name selects + launches.
const listEl = document.getElementById('game-list');
GAMES.forEach((g, i) => {
  const li = document.createElement('li');
  const btn = document.createElement('button');
  btn.type = 'button';
  btn.className = 'game-item';
  btn.dataset.idx = String(i);
  btn.setAttribute('role', 'option');
  btn.textContent = g.name;
  btn.addEventListener('click', () => { sel = i; paint(); launch(); });
  li.appendChild(btn);
  listEl.appendChild(li);
});
paint();

// Keyboard navigation
window.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft'  || e.key === 'a' || e.key === 'A') { prev();   e.preventDefault(); }
  else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') { next();   e.preventDefault(); }
  else if (e.key === 'Enter' || e.key === ' ')                       { launch(); e.preventDefault(); }
});

// On-screen arrow buttons (mouse-clickable)
document.getElementById('sel-prev').addEventListener('click', prev);
document.getElementById('sel-next').addEventListener('click', next);

// Touch buttons (coarse pointers only — gated by shared/touch.css)
Arcade.Touch.bind(document.getElementById('tc-left'),   prev,   () => {});
Arcade.Touch.bind(document.getElementById('tc-right'),  next,   () => {});
Arcade.Touch.bind(document.getElementById('tc-select'), launch, () => {});

// Refresh leaderboard mirrors from the cloud, serially (the singleton
// module isn't safe for concurrent inits). Repaints the hi-score line
// for the currently-selected game when each lands.
(async () => {
  for (const g of GAMES) {
    Arcade.Leaderboard.init({ game: g.id, max: 10 });
    try { await Arcade.Leaderboard.refresh(); } catch (_) {}
    if (GAMES[sel].id === g.id) paintHi();
  }
})();
</script>
</body>
</html>

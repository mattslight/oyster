<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oyster Arcade</title>
<meta name="description" content="A small arcade of games made by Oyster.">
<link rel="stylesheet" href="shared/pixel-font.css">
<link rel="stylesheet" href="shared/cabinet.css">
<link rel="stylesheet" href="shared/touch.css">
<style>
  /* Marquee strip + tube layout (cabinet top half). */
  .screen {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .tube { height: auto; flex: 1 1 auto; }

  .marquee {
    flex: 0 0 auto;
    height: clamp(64px, 12vh, 120px);
    background: linear-gradient(180deg, #1a1815 0%, #0d0b09 100%);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    padding: 14px 16px;
    box-shadow:
      inset 0 0 0 1px rgba(255, 255, 255, 0.04),
      inset 0 0 40px rgba(0, 0, 0, 0.85),
      0 3px 0 #100e0c;
  }
  .marquee::before {
    content: '';
    position: absolute;
    top: 7px; left: 14px; right: 14px;
    height: 4px;
    background-image: repeating-linear-gradient(
      90deg,
      #ffd84a 0, #ffd84a 4px,
      transparent 4px, transparent 14px
    );
    border-radius: 2px;
    opacity: 0.45;
    z-index: 2;
  }
  .marquee-text {
    font-family: 'Press Start 2P', ui-monospace, monospace;
    font-size: clamp(11px, 3vw, 32px);
    letter-spacing: 0.14em;
    text-align: center;
    line-height: 1.15;
    white-space: nowrap;
    /* Chrome-blue fill — horizontal bands clipped to the glyph shape. */
    background-image: linear-gradient(180deg,
      #1c4296 0%,
      #2a5fc2 16%,
      #5d92ee 30%,
      #b8d8ff 42%,
      #ffffff 50%,
      #b8d8ff 58%,
      #5d92ee 70%,
      #2a5fc2 84%,
      #1c4296 100%);
    -webkit-background-clip: text;
            background-clip: text;
    color: transparent;
    /* Crisp 1px violet outline + soft violet glow via chained
       drop-shadows. Each drop-shadow operates on the previous filter
       stage so the outline composes cleanly around the gradient fill
       (text-shadow stacked behind the gradient ends up swamping it). */
    filter:
      drop-shadow( 1px  0 0 #a855f7)
      drop-shadow(-1px  0 0 #a855f7)
      drop-shadow( 0  1px 0 #a855f7)
      drop-shadow( 0 -1px 0 #a855f7)
      drop-shadow( 0  0 10px rgba(168, 85, 247, 0.55));
  }

  /* Pixel-chrome marquee ornaments — 4-point sparkle + fading speed
     lines flanking OYSTER ARCADE. Same SVG used on both sides; the
     left copy is horizontally mirrored so both sparkles point inward. */
  .marquee-ornament {
    flex: 0 0 auto;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 clamp(8px, 1.5vw, 18px);
    pointer-events: none;
    z-index: 2;
  }
  .marquee-ornament svg {
    width: clamp(28px, 5vw, 56px);
    height: auto;
    display: block;
    opacity: 0.45;
    filter: drop-shadow(0 0 3px rgba(255, 255, 255, 0.15));
  }
  .marquee-ornament-left svg { transform: scaleX(-1); }
  @media (max-width: 480px) {
    .marquee-ornament { display: none; }
  }

  /* Selector layout: the strip viewport fills the cabinet so the focused
     card sits at the true cabinet centre. Nav arrows are positioned on
     top of the viewport's left + right edges rather than living in a
     grid column (which would offset the strip toward the right). */
  .selector {
    position: absolute;
    inset: 0;
    font-family: 'Press Start 2P', ui-monospace, monospace;
    color: #fff;
    z-index: 1;
  }

  .nav-arrow {
    position: absolute;
    top: 50%;
    z-index: 2;
    appearance: none;
    background: transparent;
    border: 3px solid rgba(45, 212, 255, 0.5);
    border-radius: 12px;
    color: #2dd4ff;
    font-family: 'Press Start 2P', ui-monospace, monospace;
    font-size: clamp(22px, 4vw, 36px);
    width: clamp(48px, 7vw, 72px);
    height: clamp(48px, 7vw, 72px);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transform: translateY(-50%);
    transition: transform 0.12s, color 0.12s, border-color 0.12s, background 0.12s;
  }
  .nav-arrow.nav-prev { left:  clamp(16px, 3vw, 40px); }
  .nav-arrow.nav-next { right: clamp(16px, 3vw, 40px); }
  .nav-arrow:hover,
  .nav-arrow:focus-visible {
    transform: translateY(-50%) scale(1.06);
    color: #ffd84a;
    border-color: #ffd84a;
    background: rgba(255, 216, 74, 0.08);
    outline: none;
  }
  .nav-arrow:active { transform: translateY(-50%) scale(0.96); }

  /* Strip viewport — horizontal carousel of all games. The strip is wider
     than the viewport; only the focused card and its neighbours show
     (overflow:hidden clips the rest). */
  .strip-viewport {
    position: absolute;
    inset: 0;
    overflow: hidden;
  }
  .strip {
    position: absolute;
    top: 50%;
    left: 50%;
    display: flex;
    align-items: center;
    gap: clamp(40px, 5vw, 80px);
    transform: translateY(-50%) translateX(var(--strip-x, 0px));
    transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.3, 1);
    will-change: transform;
  }
  .strip.no-transition,
  .strip.no-transition .game-card { transition: none; }

  /* All cards share the same layout footprint; the focused one scales up
     visually via transform (composited on the GPU — width/height don't
     change, so there's no layout/paint cost). */
  .game-card {
    flex: 0 0 clamp(160px, 22vw, 240px);
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: clamp(8px, 1.4vw, 14px);
    transform: scale(0.55);
    transform-origin: center;
    opacity: 0.45;
    transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.3, 1), opacity 0.35s ease;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .game-card.is-focused {
    transform: scale(1);
    opacity: 1;
    z-index: 1;
  }
  .game-card.is-clone { cursor: default; }

  .game-thumb {
    width: clamp(160px, 22vw, 240px);
    height: clamp(160px, 22vw, 240px);
    background: rgba(0, 0, 0, 0.55);
    border-radius: 14px;
    box-shadow:
      inset 0 0 36px rgba(0, 0, 0, 0.8),
      inset 0 0 0 2px rgba(255, 255, 255, 0.04);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: clamp(14px, 2vw, 24px);
  }
  .game-thumb svg {
    width: 85%;
    height: 85%;
    image-rendering: pixelated;
    shape-rendering: crispEdges;
  }
  .game-name {
    font-size: clamp(15px, 2.6vw, 24px);
    color: #ffd84a;
    letter-spacing: 0.12em;
    white-space: nowrap;
  }
  /* Brackets only render on the focused card. */
  .game-name .br { color: #2dd4ff; display: none; }
  .game-card.is-focused .game-name .br { display: inline; }

  .game-hi {
    font-size: clamp(9px, 1.4vw, 12px);
    letter-spacing: 0.18em;
    color: #ff3aa1;
    min-height: 14px;
    display: none;
  }
  .game-hi .hi-val { color: #ffd84a; }
  .game-hi .hi-initials { color: #2dd4ff; }
  .game-prompt {
    font-size: clamp(10px, 1.6vw, 14px);
    letter-spacing: 0.18em;
    color: #fff;
    animation: arcade-blink 1s steps(1) infinite;
    margin-top: 4px;
    display: none;
  }
  .game-card.is-focused .game-hi,
  .game-card.is-focused .game-prompt { display: block; }

  /* Coming-soon placeholder card — desaturated, distinct prompt. */
  .game-card.is-coming-soon .game-name { color: rgba(255, 255, 255, 0.55); }
  .game-card.is-coming-soon .game-name .br { color: rgba(45, 212, 255, 0.5); }
  .game-card.is-coming-soon .game-thumb { filter: saturate(0.55); }
  .game-prompt.is-soon {
    color: #2dd4ff;
    opacity: 0.7;
    animation: none;
  }

  /* Game iframe overlay — splash-poweron on launch, crt-shutoff on close
     (both keyframes from shared/cabinet.css). */
  .game-frame-wrap {
    position: absolute;
    inset: 0;
    z-index: 5;
    background: #000;
    overflow: hidden;
    display: none;
    transform-origin: center;
  }
  .game-frame-wrap.is-launched { display: block; }
  .game-frame-wrap.is-launching { animation: splash-poweron 0.55s ease-out; }
  .game-frame-wrap.is-shutting-down { animation: crt-shutoff 700ms cubic-bezier(0.4, 0, 0.2, 1) forwards; }
  @media (prefers-reduced-motion: reduce) {
    .game-frame-wrap.is-launching,
    .game-frame-wrap.is-shutting-down { animation: none; }
  }
  .game-frame-wrap iframe {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
  }
  .game-frame-exit {
    position: absolute;
    top: clamp(10px, 1.6vw, 18px);
    right: clamp(10px, 1.6vw, 18px);
    z-index: 2;
    width: clamp(40px, 5vw, 50px);
    height: clamp(40px, 5vw, 50px);
    border-radius: 10px;
    background: rgba(0, 0, 0, 0.55);
    border: 1px solid rgba(255, 255, 255, 0.3);
    color: rgba(255, 255, 255, 0.9);
    font-family: 'Press Start 2P', ui-monospace, monospace;
    font-size: clamp(18px, 2.4vw, 24px);
    line-height: 1;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }
  .game-frame-exit:hover,
  .game-frame-exit:focus-visible {
    color: #fff;
    border-color: rgba(255, 255, 255, 0.7);
    outline: none;
  }

  .arcade-credit {
    position: absolute;
    bottom: clamp(8px, 1.4vw, 14px);
    left: 0; right: 0;
    text-align: center;
    font-size: clamp(7px, 1vw, 9px);
    letter-spacing: 0.22em;
    color: rgba(255, 255, 255, 0.4);
    font-family: 'Press Start 2P', ui-monospace, monospace;
    z-index: 1;
    pointer-events: none;
  }
  .arcade-credit a { color: #2dd4ff; text-decoration: none; pointer-events: auto; }
  .arcade-credit a:hover { text-decoration: underline; }

  /* Mute toggle — small, unobtrusive, top-right of the tube. Hidden when
     a game is launched (the embedded game owns its own audio). */
  .arcade-mute {
    position: absolute;
    top: clamp(10px, 1.6vw, 18px);
    right: clamp(10px, 1.6vw, 18px);
    z-index: 3;
    appearance: none;
    width: clamp(36px, 4.5vw, 44px);
    height: clamp(36px, 4.5vw, 44px);
    border-radius: 10px;
    background: rgba(0, 0, 0, 0.4);
    border: 1px solid rgba(255, 255, 255, 0.18);
    color: rgba(255, 255, 255, 0.7);
    font-family: 'Press Start 2P', ui-monospace, monospace;
    font-size: clamp(13px, 1.8vw, 16px);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    line-height: 1;
  }
  .arcade-mute:hover,
  .arcade-mute:focus-visible {
    color: #fff;
    border-color: rgba(255, 255, 255, 0.55);
    outline: none;
  }
  .arcade-mute.is-muted { color: rgba(255, 255, 255, 0.35); }
  body.is-game-launched .arcade-mute { display: none; }

  /* Launch overlay — the Oyster Arcade splash. CRT power-on snaps the
     splash open, the wordmark glitches intermittently (chromatic split,
     skew tears, hue bursts) for the hold window, then fades to reveal
     the embedded game. JS toggles `.is-active` to start the sequence
     and `.is-fading` at the end. */
  .game-splash {
    position: absolute;
    inset: 0;
    z-index: 6;
    display: none;
    background: #000;
    pointer-events: none;
  }
  .game-splash.is-active {
    display: block;
    animation: splash-poweron 0.45s ease-out;
    pointer-events: auto;   /* catch taps to skip the splash */
    cursor: pointer;
  }
  .game-splash.is-fading { animation: game-splash-fade 0.45s ease-out forwards; }
  @keyframes game-splash-fade { to { opacity: 0; } }

  .game-splash .game-splash-main {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    background: #000;
  }
  .game-splash-img {
    max-width: min(78%, 720px);
    max-height: 72%;
    width: auto;
    height: auto;
    object-fit: contain;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    user-select: none;
    -webkit-user-drag: none;
  }
  /* Quick TV-tear glitch just after the splash lands — horizontal skew
     + offset, snapping back to clean in <0.25s. */
  .game-splash.is-active .game-splash-img {
    animation: oyster-glitch 0.22s steps(5, end) 0.5s 1;
  }
  @keyframes oyster-glitch {
    0%, 100% { transform: translate(0, 0); }
    20%      { transform: translate(-7px, 0) skewX(9deg); }
    45%      { transform: translate(5px, 1px) skewX(-7deg); }
    70%      { transform: translate(-3px, 0) skewX(4deg); }
  }

  @media (prefers-reduced-motion: reduce) {
    .game-splash.is-active           { animation: none; }
    .game-splash.is-active .game-splash-img { animation: none; }
    .game-splash.is-fading            { animation-duration: 0.01s; }
  }

  /* Coming-soon ADVERT — retro arcade marketing flyer that pops up
     when a coming-soon game with a tagline is clicked. Title, tagline,
     numbered features, slanted COMING SOON stamp. CRT scanlines from
     .crt-global still render on top so it reads as a poster in the
     cabinet's TV. */
  .game-advert {
    position: absolute;
    inset: 0;
    z-index: 7;
    display: none;
    background:
      radial-gradient(ellipse at 50% 30%, rgba(125, 80, 255, 0.30) 0%, transparent 60%),
      linear-gradient(180deg, var(--ad-bg1, #1a0d3a) 0%, var(--ad-bg2, #050a25) 100%);
    font-family: 'Press Start 2P', ui-monospace, monospace;
    pointer-events: none;
    overflow: hidden;
  }
  .game-advert.is-visible {
    display: block;
    pointer-events: auto;
    animation: splash-poweron 0.4s ease-out;
  }
  .game-advert.is-fading { animation: game-splash-fade 0.35s ease-out forwards; }

  /* Faint pixel-star backdrop (decorative). */
  .game-advert::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 12% 18%, #fff 99%, transparent 100%),
      radial-gradient(1px 1px at 78% 24%, #fff 99%, transparent 100%),
      radial-gradient(1px 1px at 34% 62%, #fff 99%, transparent 100%),
      radial-gradient(1px 1px at 88% 78%, #fff 99%, transparent 100%),
      radial-gradient(1px 1px at 22% 86%, #fff 99%, transparent 100%),
      radial-gradient(1px 1px at 62% 12%, #fff 99%, transparent 100%);
    opacity: 0.55;
  }

  .game-advert .ad-stamp {
    position: absolute;
    top: clamp(14px, 3vw, 28px);
    left: clamp(14px, 3vw, 28px);
    transform: rotate(-8deg);
    padding: 6px 10px;
    border: 3px solid var(--ad-neon, #ff3aa1);
    color: var(--ad-neon, #ff3aa1);
    font-size: clamp(9px, 1.4vw, 12px);
    letter-spacing: 0.22em;
    box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.55);
    background: rgba(0, 0, 0, 0.4);
  }
  .game-advert .ad-close {
    position: absolute;
    top: clamp(10px, 1.6vw, 18px);
    right: clamp(10px, 1.6vw, 18px);
    width: clamp(40px, 5vw, 50px);
    height: clamp(40px, 5vw, 50px);
    border-radius: 10px;
    background: rgba(0, 0, 0, 0.55);
    border: 1px solid rgba(255, 255, 255, 0.3);
    color: rgba(255, 255, 255, 0.9);
    font-family: 'Press Start 2P', ui-monospace, monospace;
    font-size: clamp(18px, 2.4vw, 24px);
    line-height: 1;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    display: flex; align-items: center; justify-content: center;
    padding: 0;
  }
  .game-advert .ad-close:hover,
  .game-advert .ad-close:focus-visible {
    color: #fff;
    border-color: rgba(255, 255, 255, 0.7);
    outline: none;
  }

  .game-advert .ad-content {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: clamp(28px, 6vw, 60px) clamp(18px, 4vw, 40px);
    text-align: center;
    gap: clamp(12px, 2vw, 20px);
  }
  .game-advert .ad-title {
    font-size: clamp(26px, 6vw, 64px);
    letter-spacing: 0.10em;
    color: var(--ad-accent, #ffd84a);
    text-shadow:
      4px 4px 0 var(--ad-neon, #ff3aa1),
      8px 8px 0 #2dd4ff,
      0 0 28px rgba(255, 216, 74, 0.45);
    line-height: 1;
  }
  .game-advert .ad-tagline {
    font-size: clamp(11px, 1.9vw, 18px);
    letter-spacing: 0.10em;
    color: #e9d8ff;
    line-height: 1.45;
    max-width: 80%;
  }
  .game-advert .ad-features {
    list-style: none;
    padding: 0;
    margin: clamp(10px, 1.6vw, 18px) 0 0;
    display: flex;
    flex-direction: column;
    gap: clamp(8px, 1.2vw, 12px);
    font-size: clamp(10px, 1.6vw, 14px);
    letter-spacing: 0.06em;
    color: #fff;
    text-align: left;
  }
  .game-advert .ad-features li {
    position: relative;
    padding-left: 1.6em;
  }
  .game-advert .ad-features li::before {
    content: '▸';
    position: absolute;
    left: 0; top: 0;
    color: #2dd4ff;
  }
  .game-advert .ad-footer {
    margin-top: clamp(14px, 2.4vw, 22px);
    font-size: clamp(9px, 1.4vw, 12px);
    letter-spacing: 0.24em;
    color: rgba(255, 255, 255, 0.5);
    animation: arcade-blink 1.2s steps(1) infinite;
  }

  /* PLAY touch button — orange to distinguish from cyan ◀ ▶. */
  .touch-controls .tc-select {
    width: auto;
    min-width: clamp(80px, 16vw, 120px);
    height: clamp(56px, 11vw, 80px);
    padding: 0 clamp(14px, 2.5vw, 22px);
    border-color: rgba(255, 132, 0, 0.7);
    color: #ff8800;
    font-size: clamp(12px, 2vw, 18px);
    letter-spacing: 0.12em;
  }
  .touch-controls .tc-select:active,
  .touch-controls .tc-select.is-pressed {
    background: rgba(255, 132, 0, 0.25);
    border-color: #ff8800;
    color: #fff;
  }
  .tube.is-game-launched .touch-controls { display: none !important; }

  /* On touch / coarse-pointer devices, hide the cabinet's in-screen
     ◀ ▶ buttons — the bottom touch-controls cluster handles navigation,
     so the in-screen arrows would be redundant. The cabinet keeps them
     on mice / trackpads. */
  @media (pointer: coarse) {
    .nav-arrow { display: none; }
  }

  /* GLOBAL CRT — single scanline + sub-pixel + curved-mask layer that
     sits on top of EVERYTHING (marquee, tube, splash, boot screen). One
     source of truth so a future setting can toggle / tune it in one
     place. Uses a bright-on-dark scanline so it reads against pure
     black; on lighter content the dark sub-stripe takes over.
     Hidden once the iframe takes over so the embedded game's own CRT
     doesn't double up. */
  .crt-global {
    position: absolute;
    inset: 0;
    z-index: 100;
    pointer-events: none;
  }
  .crt-global::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(rgba(255, 255, 255, 0.045) 50%, rgba(0, 0, 0, 0.28) 50%),
      linear-gradient(90deg, rgba(255, 0, 0, 0.08), rgba(0, 255, 0, 0.03), rgba(0, 0, 255, 0.08));
    background-size: 100% 3px, 3px 100%;
  }
  .crt-global::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url('../assets/crt.png');
    background-repeat: no-repeat;
    background-size: 100% 100%;
    opacity: 0.55;
  }
  /* In arcade home the global CRT supersedes the cabinet's tube overlay
     (.overlay stays in shared/cabinet.css for per-game pages, but is
     redundant here). Vignette still adds the rounded-corner falloff. */
  .tube > .overlay { display: none; }
  body.is-game-launched .crt-global { display: none; }

  /* Selecting a game flips the whole surface into fullscreen — cabinet
     chrome (marquee, padding, rounded tube, vignette, controls) all
     hide the moment .is-launching is set, so the boot scene, Oyster
     splash, and the game itself share one unbroken canvas. The global
     CRT stays on through boot+splash and only drops off when
     .is-game-launched takes over (the embedded game's own CRT then
     takes the baton). */
  body.is-launching .marquee,
  body.is-launching .selector,
  body.is-launching .arcade-credit,
  body.is-launching .arcade-mute,
  body.is-launching .tube > .vignette {
    display: none;
  }
  /* `.tube.is-ready .touch-controls` in shared/touch.css has higher
     specificity than `body.is-launching …`, so escalate. */
  body.is-launching .touch-controls { display: none !important; }
  body.is-launching .screen { padding: 0; gap: 0; background: #000; }
  body.is-launching .tube   { border-radius: 0; box-shadow: none; }

  @media (prefers-reduced-motion: reduce) {
    .strip,
    .game-card,
    .nav-arrow { transition: none; }
  }
</style>
</head>
<body>
<div class="screen">
  <div class="marquee">
    <span class="marquee-ornament marquee-ornament-left" aria-hidden="true">
      <svg viewBox="0 0 64 26">
        <!-- 4-point pixel sparkle, centred near the left of the SVG -->
        <rect x="11" y="2"  width="2"  height="22" fill="#fff"/>
        <rect x="12" y="0"  width="1"  height="2"  fill="#fff"/>
        <rect x="12" y="24" width="1"  height="2"  fill="#fff"/>

<script>
// ============================================
// CATALOGUE — add a new game here + its preview <template> above.
// ============================================
const GAMES = [

  {
    id: 'zero-g-trainer', name: 'ZERO-G TRAINER',
    preview: 'preview-coming-soon', comingSoon: true,
    tagline: 'Pump iron in low gravity',
    features: [
      'Rhythm-press lifts in slow-mo',
      'Heavier plates = more drift to wrestle',
      'Don’t let the dumbbells float away',
    ],
    palette: { bg1: '#0c1438', bg2: '#020414', accent: '#2dd4ff', neon: '#a855f7' },
  },
  {
    id: 'dead-station', name: 'DEAD STATION',
    preview: 'preview-coming-soon', comingSoon: true,
    tagline: 'Explore an abandoned space station',
    features: [
      'A torchlight is all you have',
      'Listen for the things that listen back',
      'Find out what happened to the crew',
    ],
    palette: { bg1: '#0a1a14', bg2: '#020806', accent: '#4ade80', neon: '#a855f7' },
  },
  {
    id: 'star-troopers', name: 'STAR TROOPERS',
    preview: 'preview-coming-soon', comingSoon: true,
    tagline: 'Run and gun across alien battlefields',
    features: [
      'Storm enemy strongholds on foot',
      'Pick up weapon power-ups mid-mission',
      'Take down massive end-of-level bosses',
    ],
    palette: { bg1: '#1c2a0c', bg2: '#04080a', accent: '#a3e635', neon: '#ffd84a' },
  },
  {
    id: 'astro-courier',
    name: 'ASTRO COURIER',
    preview: 'preview-coming-soon',
    comingSoon: true,
    tagline: 'Deliver packages between tiny planets',
    features: [
      'Ration fuel like your life depends on it',
      'Slingshot around moons for speed',
      'Outrun — or outgun — space pirates',
    ],
    palette: { bg1: '#1a0d3a', bg2: '#050a25', accent: '#ffd84a', neon: '#ff3aa1' },
  },
];
const N = GAMES.length;
const TRANSITION_MS = 400;

let sel = 0;
let stripPos = 0;   // strip-index where the focused card currently sits
let launched = false;
// Set briefly to the future after a swipe so the synthesised click event
// at touch-end doesn't also launch a game / reposition a card.
let suppressClickUntil = 0;

// ============================================
// STRIP — all N games rendered COPIES times, in order. The middle copy
// is the "canonical" one; the others provide buffer for the strip to
// drift through during wraps. Every visible position has identical
// content across all copies, so when we DO need to silently normalize
// (only on the rare occasion that we're about to overflow the strip),
// the jump is invisible.
//
// With 5 copies and N=5, the user can navigate 10 positions in one
// direction before hitting the overflow boundary — covers any
// reasonable session of arrow-mashing. We deliberately do NOT
// normalize after every slide; that ran a silent translate + class
// swap 40 ms after the wrap landed, and even with identical copies
// some pixel-level reconciliation in the GPU compositor surfaces it
// as a tiny jolt. No post-slide normalize → no jolt.
// ============================================
// 3 copies gives N=9 → 27 cards (vs 5×9=45). Plenty of buffer before
// the silent overflow-normalize kicks in, and ~40% less DOM / fewer
// composited layers — meaningful on iPad where each transformed card
// became its own paint layer.
const COPIES = 3;
const CANONICAL_COPY = Math.floor(COPIES / 2);

function buildCard(game, realIdx, isClone) {
  const card = document.createElement('div');
  card.className = 'game-card';
  if (isClone) card.classList.add('is-clone');
  if (game.comingSoon) card.classList.add('is-coming-soon');
  card.dataset.realIdx = String(realIdx);

  const thumb = document.createElement('div');
  thumb.className = 'game-thumb';
  const tpl = document.getElementById(game.preview);
  if (tpl) thumb.appendChild(tpl.content.cloneNode(true));
  card.appendChild(thumb);

  const name = document.createElement('div');
  name.className = 'game-name';
  name.innerHTML = '<span class="br">[</span> ' + game.name + ' <span class="br">]</span>';
  card.appendChild(name);

  if (!game.comingSoon) {
    const hi = document.createElement('div');
    hi.className = 'game-hi';
    card.appendChild(hi);
  }

  const prompt = document.createElement('div');
  prompt.className = 'game-prompt';
  if (game.comingSoon) {
    prompt.classList.add('is-soon');
    prompt.textContent = 'STAY TUNED';
  } else {
    prompt.innerHTML = '<span class="key-only">PRESS ENTER TO PLAY</span><span class="touch-only">TAP PLAY</span>';
  }
  card.appendChild(prompt);

  // Click handler — all cards are clickable (in 3-copies design every
  // copy is real-looking). Centered card launches; any other navigates
  // to that game. Swipes suppress the synthesised click for 350ms.
  card.addEventListener('click', e => {
    if (Date.now() < suppressClickUntil) return;
    const strip = document.getElementById('strip');
    const idx = Array.prototype.indexOf.call(strip.children, e.currentTarget);
    if (idx === stripPos) launch();
    else navigateTo(realIdx);
  });

  return card;
}

function mountStrip() {
  const strip = document.getElementById('strip');
  strip.replaceChildren();
  for (let c = 0; c < COPIES; c++) {
    for (let i = 0; i < N; i++) {
      strip.appendChild(buildCard(GAMES[i], i, c !== CANONICAL_COPY));
    }
  }
}

// Canonical strip-idx for a real-idx: the middle copy.
function canonicalStripFor(realIdx) { return CANONICAL_COPY * N + realIdx; }

// cardCentre = layout position of the target card's centre within the
// strip. Measured directly on the DOM — offsetLeft / offsetWidth are
// pre-transform layout values, so they're correct even with the cards'
// scale() transform. A forced reflow on the strip's offsetWidth right
// before measuring guarantees layout has settled (covers the early-
// bootstrap timing where measurements could otherwise be stale).
function cardCentreFor(stripIdx) {
  const strip = document.getElementById('strip');
  const target = strip && strip.children[stripIdx];
  if (!target) return 0;
  void strip.offsetWidth;                          // force layout
  return target.offsetLeft + target.offsetWidth / 2;
}

// Translate the strip so the card at `stripIdx` sits centred in the
// viewport. Toggle .is-focused FIRST so display-block prompt/hi-score
// is applied before we measure — otherwise layout might shift between
// the measure-time state and the final paint, causing the focused
// card to land slightly off-centre. With no-transition active the
// cards don't animate their scale change either, so the snap is silent.
function translateStripTo(stripIdx, animate) {
  const strip = document.getElementById('strip');
  if (!strip.children[stripIdx]) return;
  if (!animate) strip.classList.add('no-transition');
  for (let i = 0; i < strip.children.length; i++) {
    strip.children[i].classList.toggle('is-focused', i === stripIdx);
  }
  const cardCentre = cardCentreFor(stripIdx);
  strip.style.setProperty('--strip-x', '-' + cardCentre + 'px');
  if (!animate) {
    void strip.offsetWidth;
    strip.classList.remove('no-transition');
  }
  paintHi();
}

function paintHi() {
  const strip = document.getElementById('strip');
  const card = strip.children[stripPos];
  if (!card) return;
  const hi = card.querySelector('.game-hi');
  if (!hi) return;  // coming-soon
  const g = GAMES[sel];
  Arcade.Leaderboard.init({ game: g.id, max: 10 });
  const top = Arcade.Leaderboard.getHighScore();
  if (!top) { hi.textContent = ' '; return; }
  hi.innerHTML =
    'HIGH SCORE <span class="hi-val">' + String(top.score).padStart(3, '0') + '</span> ' +
    '<span class="hi-initials">' + (top.initials || '---') + '</span>';
}

// ============================================
// NAVIGATION — directional move that DRIFTS stripPos across copies.
// We deliberately don't normalize after every slide: it created a
// post-slide jolt on wraps. With 5 copies the user has tons of buffer;
// we only normalize silently when about to overflow the strip.
// ============================================
function navigate(delta) {
  if (launched) return;
  // Pre-empt overflow: if the next step would walk off the strip, jump
  // silently to the middle copy first. Content at every visible offset
  // is identical across copies, so the user doesn't see the jump.
  if (stripPos + delta < 0 || stripPos + delta >= COPIES * N) {
    stripPos = canonicalStripFor(sel);
    translateStripTo(stripPos, false);
  }
  sel = (sel + delta + N) % N;
  stripPos += delta;
  translateStripTo(stripPos, true);
  Arcade.Audio.play('sfx-select', 0.4);
}

// Click / direct jump to a specific real index. Picks the strip-idx
// copy of `newSel` closest to the current stripPos so the slide is the
// shortest path.
function navigateTo(newSel) {
  if (launched) return;
  if (newSel === sel) { launch(); return; }
  let target = canonicalStripFor(newSel);
  for (let c = 0; c < COPIES; c++) {
    const cand = c * N + newSel;
    if (Math.abs(cand - stripPos) < Math.abs(target - stripPos)) target = cand;
  }
  sel = newSel;
  stripPos = target;
  translateStripTo(stripPos, true);
  Arcade.Audio.play('sfx-select', 0.4);
}

function next() { navigate(+1); }
function prev() { navigate(-1); }

// ============================================
// LAUNCH / CLOSE — iframe overlay using shared CRT animations.
// ============================================
const tube = document.querySelector('.tube');
const wrap = document.getElementById('game-frame-wrap');
const frame = document.getElementById('game-frame');
const exitBtn = document.getElementById('game-frame-exit');

// Launch flow:
//   tap PLAY → click sfx → CRT power-on snaps the Oyster Arcade splash
//   open → glitch animation runs across the wordmark → ba-ding chime
//   fires ~3s in → splash fades, iframe takes over.
// SPLASH_READY_MS is the time from .is-active being added to the splash
// being fully on-screen (the CRT power-on lands at ~450ms).
const SPLASH_READY_MS       = 450;
const SPLASH_HOLD_MS        = 4000;   // how long the splash stays after it lands
const SPLASH_CHIME_DELAY_MS = 2000;   // delay after splash lands before ba-ding plays
const SPLASH_FADE_MS        = 450;
const splashEl = document.getElementById('game-splash');

let splashTimers = [];
function clearSplashTimers() { splashTimers.forEach(clearTimeout); splashTimers = []; }
function resetSplash() {
  if (!splashEl) return;
  clearSplashTimers();
  splashEl.classList.remove('is-active', 'is-fading');
}

// ============================================
// COMING-SOON ADVERT — populated per-game from GAMES entries that have
// `tagline` and optional `features` / `palette` fields. Dismisses on
// the × button, ESC, or any tap/keypress while visible.
// ============================================
const advertEl = document.getElementById('game-advert');
// Hoisted above showAdvert / hideAdvert so the closure refs are safely
// in scope no matter when the advert is invoked.
let advertCleanup = null;
function showAdvert(g) {
  if (!advertEl) return;
  advertEl.querySelector('#ad-title').textContent   = g.name;
  advertEl.querySelector('#ad-tagline').textContent = g.tagline || '';
  const list = advertEl.querySelector('#ad-features');
  list.innerHTML = '';
  (g.features || []).forEach(f => {
    const li = document.createElement('li');
    li.textContent = f;
    list.appendChild(li);
  });
  // Per-game palette via CSS custom properties (with sensible defaults).
  const p = g.palette || {};
  advertEl.style.setProperty('--ad-bg1',    p.bg1    || '#1a0d3a');
  advertEl.style.setProperty('--ad-bg2',    p.bg2    || '#050a25');
  advertEl.style.setProperty('--ad-accent', p.accent || '#ffd84a');
  advertEl.style.setProperty('--ad-neon',   p.neon   || '#ff3aa1');
  // Track listeners so hideAdvert() always tears them down — whether
  // dismissed via × button, ESC, tap outside, or a re-opened advert.
  // Previously the × routed through hideAdvert() directly, bypassing
  // the keydown/pointerdown cleanup and leaving stale handlers
  // attached that would fire on the next keypress.
  if (advertCleanup) advertCleanup();
  advertEl.classList.remove('is-fading');
  void advertEl.offsetWidth;
  advertEl.classList.add('is-visible');
  advertEl.setAttribute('aria-hidden', 'false');
  function onKey()   { hideAdvert(); }
  function onTap(e) {
    if (e.target.closest('#ad-close')) return;   // × has its own click handler
    hideAdvert();
  }
  window.addEventListener('keydown', onKey, { once: true });
  advertEl.addEventListener('pointerdown', onTap);
  advertCleanup = () => {
    window.removeEventListener('keydown', onKey);
    advertEl.removeEventListener('pointerdown', onTap);
    advertCleanup = null;
  };
}
function hideAdvert() {
  if (!advertEl) return;
  if (advertCleanup) advertCleanup();
  advertEl.classList.add('is-fading');
  setTimeout(() => {
    advertEl.classList.remove('is-visible', 'is-fading');
    advertEl.setAttribute('aria-hidden', 'true');
  }, 350);
}
document.getElementById('ad-close').addEventListener('click', e => {
  e.stopPropagation();
  hideAdvert();
});

function launch() {
  if (launched) return;
  const g = GAMES[sel];
  if (g.comingSoon) {
    // Coming-soon games with marketing copy open an advert instead of
    // launching. Plain "COMING SOON" cards (no tagline) just no-op.
    if (g.tagline) showAdvert(g);
    return;
  }
  launched = true;

  Arcade.Audio.play('sfx-game-start', 0.55);

  // Toggle .is-active off → reflow → on so the CRT power-on + glitch
  // animations retrigger every launch.
  resetSplash();
  void splashEl.offsetWidth;
  splashEl.classList.add('is-active');

  // Ba-ding fires part-way through the splash, after the wordmark has
  // settled and glitched a few times.
  splashTimers.push(setTimeout(() => Arcade.Audio.play('sfx-game-intro', 0.6), SPLASH_READY_MS + SPLASH_CHIME_DELAY_MS));

  function dismissSplash() {
    if (!launched) return;
    splashEl.classList.add('is-fading');
    // Load the iframe NOW (not at launch start) so the game's title
    // music doesn't kick in during the splash. The fade window + load
    // latency hide the gap before the title screen appears.
    // `embedded=1` tells the game it's running inside the arcade
    // cabinet so it can hide its own boot intro (the arcade already
    // showed one). Direct visits — e.g. the rocket-ship easter egg on
    // oyster.to — keep their boot.
    const sep = g.url.includes('?') ? '&' : '?';
    frame.src = g.url + sep + 'embedded=1';
    splashTimers.push(setTimeout(() => {
      splashEl.classList.remove('is-active', 'is-fading');
      // Splash done — embedded game's own CRT takes over. Keep
      // .is-launching set so the cabinet stays in its fullscreen state;
      // .is-game-launched adds on top and hides the global CRT.
      document.body.classList.add('is-game-launched');
      tube.classList.add('is-game-launched');
      // Hand off keyboard focus to the iframe now that the splash is
      // gone. Before this, focus must stay in the parent so the
      // any-key-to-skip handler on `window` can actually fire.
      try { frame.focus(); } catch (_) {}
    }, SPLASH_FADE_MS));
  }
  splashTimers.push(setTimeout(dismissSplash, SPLASH_READY_MS + SPLASH_HOLD_MS));

  // Any tap / click / keypress on the splash skips ahead and dismisses
  // it early. One-shot — once it fires (or the auto-dismiss fires), the
  // listeners detach.
  function skip() { detach(); clearSplashTimers(); dismissSplash(); }
  function detach() {
    splashEl.removeEventListener('pointerdown', skip);
    window.removeEventListener('keydown', skip);
  }
  splashEl.addEventListener('pointerdown', skip, { once: true });
  window.addEventListener('keydown', skip, { once: true });
  splashTimers.push(setTimeout(detach, SPLASH_READY_MS + SPLASH_HOLD_MS + 50));

  wrap.classList.remove('is-shutting-down');
  wrap.classList.add('is-launched', 'is-launching');
  wrap.setAttribute('aria-hidden', 'false');
  document.body.classList.add('is-launching');
  setTimeout(() => wrap.classList.remove('is-launching'), 600);
  // (frame.focus is now deferred to after the splash dismisses so the
  // any-key-skip listener on window can fire during the splash.)
}

function close() {
  if (!launched) return;
  launched = false;

  resetSplash();

  wrap.classList.add('is-shutting-down');
  setTimeout(() => {
    wrap.classList.remove('is-launched', 'is-shutting-down', 'is-launching');
    wrap.setAttribute('aria-hidden', 'true');
    tube.classList.remove('is-game-launched');
    document.body.classList.remove('is-launching', 'is-game-launched');
    try { frame.src = 'about:blank'; } catch (_) {}
    paintHi();
    Arcade.Leaderboard.init({ game: GAMES[sel].id, max: 10 });
    Arcade.Leaderboard.refresh().then(paintHi);
  }, 720);
}

exitBtn.addEventListener('click', close);

window.addEventListener('keydown', e => {
  if (e.key === 'Escape' && launched) { close(); e.preventDefault(); }
});

window.addEventListener('message', e => {
  if (!e || !e.data) return;
  if (frame && e.source !== frame.contentWindow) return;
  const t = e.data.type;
  if (t === 'arcade-close' || t === 'oyster-rocket-close') close();
});

// ============================================
// INPUT — keyboard, on-screen arrows, touch buttons.
// ============================================
window.addEventListener('keydown', e => {
  if (launched) return;
  if      (e.key === 'ArrowLeft'  || e.key === 'a' || e.key === 'A') { prev();   e.preventDefault(); }
  else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') { next();   e.preventDefault(); }
  else if (e.key === 'Enter'      || e.key === ' ')                  { launch(); e.preventDefault(); }
});
document.getElementById('nav-prev').addEventListener('click', prev);
document.getElementById('nav-next').addEventListener('click', next);
Arcade.Touch.bind(document.getElementById('tc-left'),   prev,   () => {});
Arcade.Touch.bind(document.getElementById('tc-right'),  next,   () => {});
Arcade.Touch.bind(document.getElementById('tc-select'), launch, () => {});

// Swipe navigation on the strip viewport. Threshold of 40px and a
// horizontal-dominance check keep accidental scrolls from triggering.
// Listeners are passive so we never block scrolling; the page doesn't
// need to scroll vertically inside the cabinet anyway.
(function () {
  const SWIPE_THRESHOLD = 40;
  const viewport = document.querySelector('.strip-viewport');
  if (!viewport) return;
  let startX = 0, startY = 0, active = false;
  viewport.addEventListener('touchstart', e => {
    if (launched) { active = false; return; }
    if (e.touches.length !== 1) { active = false; return; }
    active = true;
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
  }, { passive: true });
  viewport.addEventListener('touchend', e => {
    if (!active) return;
    active = false;
    if (launched) return;
    if (e.changedTouches.length !== 1) return;
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    if (Math.abs(dx) < SWIPE_THRESHOLD) return;
    if (Math.abs(dx) <= Math.abs(dy)) return;
    suppressClickUntil = Date.now() + 350;
    if (dx < 0) next(); else prev();
  }, { passive: true });
})();

// ============================================
// BOOT — mount strip, position the initial focused card at the middle
// copy. On resize, re-translate (card widths are clamp() and change
// with viewport width, so the centre offset shifts).
// ============================================
mountStrip();
stripPos = canonicalStripFor(sel);
// Defer to the next frame so card layout (clamp() widths, flex gap)
// is fully resolved before we measure offsetWidth — measuring during
// the synchronous post-mount window can return 0 / stale values and
// leave the strip translated to the wrong x.
requestAnimationFrame(() => translateStripTo(stripPos, false));
window.addEventListener('resize', () => {
  stripPos = canonicalStripFor(sel);
  translateStripTo(stripPos, false);
});

(async () => {
  for (const g of GAMES) {
    if (g.comingSoon) continue;
    Arcade.Leaderboard.init({ game: g.id, max: 10 });
    try { await Arcade.Leaderboard.refresh(); } catch (_) {}
    if (GAMES[sel].id === g.id) paintHi();
  }
})();

// ============================================
// AUDIO — short SFX only (no looping BGM on the select screen).
// `select` blips on left/right navigation; `game-start` on PLAY tap;
// `game-intro` rides the post-load boot splash. Mute state mirrors to
// every <audio> element via Arcade.Audio.setMuted and persists
// (mutedKey). AudioContext spins up on the first user gesture so iOS
// allows playback.
// ============================================
Arcade.Audio.init({
  sfx: {
    'sfx-select':     'sfx-select.mp3',
    'sfx-game-start': 'sfx-game-start.mp3',
    'sfx-game-intro': 'sfx-oyster.wav',
  },
  mutedKey: 'oyster-arcade-select-muted',
});

// Prime the AudioContext on the first user gesture (autoplay policy).
let audioPrimed = false;
function primeAudio() {
  if (audioPrimed) return;
  audioPrimed = true;
  Arcade.Audio.ensureCtx();
}
['keydown', 'pointerdown', 'touchstart'].forEach(ev => {
  window.addEventListener(ev, primeAudio, { passive: true });
});

const muteBtn = document.getElementById('arcade-mute');
function paintMute() {
  const m = Arcade.Audio.isMuted();
  muteBtn.classList.toggle('is-muted', m);
  muteBtn.textContent = m ? '✕' : '♪';
  muteBtn.setAttribute('aria-pressed', m ? 'true' : 'false');
}
muteBtn.addEventListener('click', () => {
  primeAudio();
  Arcade.Audio.setMuted(!Arcade.Audio.isMuted());
  paintMute();
});
paintMute();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oyster Arcade</title>
<meta name="description" content="A small arcade of games made by Oyster.">
<link rel="stylesheet" href="shared/pixel-font.css">
<link rel="stylesheet" href="shared/cabinet.css">
<link rel="stylesheet" href="shared/touch.css">
<style>
  /* Marquee strip + tube layout (cabinet top half). */
  .screen {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .tube { height: auto; flex: 1 1 auto; }

  .marquee {
    flex: 0 0 auto;
    height: clamp(64px, 12vh, 120px);
    background: linear-gradient(180deg, #1a1815 0%, #0d0b09 100%);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    padding: 14px 16px;
    box-shadow:
      inset 0 0 0 1px rgba(255, 255, 255, 0.04),
      inset 0 0 40px rgba(0, 0, 0, 0.85),
      0 3px 0 #100e0c;
  }
  .marquee::before {
    content: '';
    position: absolute;
    top: 7px; left: 14px; right: 14px;
    height: 4px;
    background-image: repeating-linear-gradient(
      90deg,
      #ffd84a 0,
      #ffd84a 4px,
      transparent 4px,
      transparent 14px
    );
    border-radius: 2px;
    opacity: 0.45;
  }
  .marquee-text {
    font-family: 'Press Start 2P', ui-monospace, monospace;
    font-size: clamp(15px, 5vw, 52px);
    color: #ffd84a;
    letter-spacing: 0.14em;
    text-align: center;
    line-height: 1.15;
    white-space: nowrap;
    text-shadow:
      3px 3px 0 #ff3aa1,
      6px 6px 0 #2dd4ff,
      0 0 30px rgba(255, 216, 74, 0.55);
  }

  /* Selector — arrows flank a 3-slot grid that always has the focused
     card centred. Empty slots on the edges (when the list runs out)
     keep the focused card anchored to the middle. */
  .selector {
    position: absolute;
    inset: 0;
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    padding: clamp(20px, 3.5vw, 48px);
    font-family: 'Press Start 2P', ui-monospace, monospace;
    color: #fff;
    z-index: 1;
    animation: splash-poweron 0.55s ease-out;
  }

  .nav-arrow {
    appearance: none;
    background: transparent;
    border: 3px solid rgba(45, 212, 255, 0.5);
    border-radius: 12px;
    color: #2dd4ff;
    font-family: 'Press Start 2P', ui-monospace, monospace;
    font-size: clamp(22px, 4vw, 36px);
    width: clamp(48px, 7vw, 72px);
    height: clamp(48px, 7vw, 72px);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.12s, color 0.12s, border-color 0.12s, background 0.12s;
  }
  .nav-arrow:hover,
  .nav-arrow:focus-visible {
    transform: scale(1.06);
    color: #ffd84a;
    border-color: #ffd84a;
    background: rgba(255, 216, 74, 0.08);
    outline: none;
  }
  .nav-arrow:active { transform: scale(0.96); }
  .nav-arrow[disabled] {
    opacity: 0.25;
    cursor: not-allowed;
    pointer-events: none;
  }

  .stage-grid {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    justify-items: center;
    gap: clamp(20px, 4vw, 60px);
    width: 100%;
  }
  .stage-slot {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: clamp(180px, 28vw, 280px);
  }

  /* The card — same internal structure for focused and adjacent; CSS
     scales + dims the off-centre ones and hides their hi-score / prompt. */
  .game-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: clamp(8px, 1.4vw, 14px);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: opacity 0.25s ease, transform 0.25s ease;
    animation: card-in 0.3s ease-out;
  }
  @keyframes card-in {
    0%   { opacity: 0; transform: translateY(6px) scale(var(--in-scale, 1)); }
    100% { opacity: var(--in-opacity, 1); transform: translateY(0) scale(var(--in-scale, 1)); }
  }
  .game-card.is-prev,
  .game-card.is-next {
    --in-opacity: 0.4;
    --in-scale: 0.62;
    opacity: 0.4;
    transform: scale(0.62);
  }
  .game-card.is-prev:hover,
  .game-card.is-next:hover {
    opacity: 0.75;
  }

  .game-thumb {
    width: clamp(160px, 22vw, 240px);
    height: clamp(160px, 22vw, 240px);
    background: rgba(0, 0, 0, 0.55);
    border-radius: 14px;
    box-shadow:
      inset 0 0 36px rgba(0, 0, 0, 0.8),
      inset 0 0 0 2px rgba(255, 255, 255, 0.04);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: clamp(14px, 2vw, 24px);
  }
  .game-thumb svg {
    width: 85%;
    height: 85%;
    image-rendering: pixelated;
    shape-rendering: crispEdges;
  }
  .game-name {
    font-size: clamp(13px, 2.5vw, 24px);
    color: #ffd84a;
    letter-spacing: 0.1em;
    white-space: nowrap;
  }
  /* Brackets only render on the focused card. */
  .game-name .br { color: #2dd4ff; display: none; }
  .game-card.is-focused .game-name .br { display: inline; }

  .game-hi {
    font-size: clamp(9px, 1.4vw, 12px);
    letter-spacing: 0.18em;
    color: #ff3aa1;
    min-height: 14px;
    display: none;
  }
  .game-hi .hi-val { color: #ffd84a; }
  .game-hi .hi-initials { color: #2dd4ff; }
  .game-prompt {
    font-size: clamp(10px, 1.6vw, 14px);
    letter-spacing: 0.18em;
    color: #fff;
    animation: arcade-blink 1s steps(1) infinite;
    margin-top: 4px;
    display: none;
  }
  .game-card.is-focused .game-hi,
  .game-card.is-focused .game-prompt { display: block; }

  /* Coming-soon placeholder card — slightly desaturated, distinct prompt. */
  .game-card.is-coming-soon .game-name {
    color: rgba(255, 255, 255, 0.55);
  }
  .game-card.is-coming-soon .game-name .br { color: rgba(45, 212, 255, 0.5); }
  .game-card.is-coming-soon .game-thumb {
    filter: saturate(0.55);
  }
  .game-prompt.is-soon {
    color: #2dd4ff;
    opacity: 0.7;
    animation: none;
  }

  /* Game iframe overlay — covers the inside of the tube during launch.
     splash-poweron on launch, crt-shutoff on close (both from
     shared/cabinet.css). */
  .game-frame-wrap {
    position: absolute;
    inset: 0;
    z-index: 5;
    background: #000;
    overflow: hidden;
    display: none;
    transform-origin: center;
  }
  .game-frame-wrap.is-launched { display: block; }
  .game-frame-wrap.is-launching { animation: splash-poweron 0.55s ease-out; }
  .game-frame-wrap.is-shutting-down { animation: crt-shutoff 700ms cubic-bezier(0.4, 0, 0.2, 1) forwards; }
  @media (prefers-reduced-motion: reduce) {
    .game-frame-wrap.is-launching,
    .game-frame-wrap.is-shutting-down { animation: none; }
  }
  .game-frame-wrap iframe {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
  }
  .game-frame-exit {
    position: absolute;
    top: clamp(10px, 1.6vw, 18px);
    right: clamp(10px, 1.6vw, 18px);
    z-index: 2;
    width: clamp(40px, 5vw, 50px);
    height: clamp(40px, 5vw, 50px);
    border-radius: 10px;
    background: rgba(0, 0, 0, 0.55);
    border: 1px solid rgba(255, 255, 255, 0.3);
    color: rgba(255, 255, 255, 0.9);
    font-family: 'Press Start 2P', ui-monospace, monospace;
    font-size: clamp(18px, 2.4vw, 24px);
    line-height: 1;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }
  .game-frame-exit:hover,
  .game-frame-exit:focus-visible {
    color: #fff;
    border-color: rgba(255, 255, 255, 0.7);
    outline: none;
  }

  .arcade-credit {
    position: absolute;
    bottom: clamp(8px, 1.4vw, 14px);
    left: 0; right: 0;
    text-align: center;
    font-size: clamp(7px, 1vw, 9px);
    letter-spacing: 0.22em;
    color: rgba(255, 255, 255, 0.4);
    font-family: 'Press Start 2P', ui-monospace, monospace;
    z-index: 1;
    pointer-events: none;
  }
  .arcade-credit a { color: #2dd4ff; text-decoration: none; pointer-events: auto; }
  .arcade-credit a:hover { text-decoration: underline; }

  .touch-controls .tc-select {
    width: auto;
    min-width: clamp(80px, 16vw, 120px);
    height: clamp(56px, 11vw, 80px);
    padding: 0 clamp(14px, 2.5vw, 22px);
    border-color: rgba(255, 132, 0, 0.7);
    color: #ff8800;
    font-size: clamp(12px, 2vw, 18px);
    letter-spacing: 0.12em;
  }
  .touch-controls .tc-select:active,
  .touch-controls .tc-select.is-pressed {
    background: rgba(255, 132, 0, 0.25);
    border-color: #ff8800;
    color: #fff;
  }
  .tube.is-game-launched .touch-controls { display: none !important; }

  /* When a game is launched, the arcade's outer cabinet chrome hides so it
     doesn't double up with the embedded game's own bezel + scanlines +
     vignette. The iframe fills the viewport; its own chrome becomes the
     visible cabinet. The class stays applied through the CRT-shutoff
     animation so the iframe scales cleanly into nothing before the arcade
     selector returns. */
  body.is-game-launched .marquee,
  body.is-game-launched .selector,
  body.is-game-launched .arcade-credit,
  body.is-game-launched .tube > .overlay,
  body.is-game-launched .tube > .vignette {
    display: none;
  }
  body.is-game-launched .screen {
    padding: 0;
    gap: 0;
    background: #000;
  }
  body.is-game-launched .tube {
    border-radius: 0;
    box-shadow: none;
  }

  /* Narrow viewports: hide the adjacent slots AND the in-cabinet nav
     arrows so the focused card has the cabinet to itself. The bottom
     touch-controls cluster (◀ ▶ + PLAY) handles navigation on mobile,
     so the in-cabinet arrows would be redundant. */
  @media (max-width: 640px) {
    .selector {
      grid-template-columns: 1fr;
      padding: clamp(16px, 3vw, 32px);
      /* Reserve room at the bottom for the touch-controls cluster so the
         card never sits behind the JUMP / PLAY buttons. */
      padding-bottom: clamp(104px, 18vw, 140px);
    }
    .nav-arrow { display: none; }
    .stage-grid { grid-template-columns: 1fr; }
    .stage-slot { min-height: 0; }
    .game-card.is-prev,
    .game-card.is-next { display: none; }
    .game-thumb {
      width: clamp(128px, 38vw, 180px);
      height: clamp(128px, 38vw, 180px);
      padding: clamp(10px, 2vw, 18px);
    }
  }

  @media (prefers-reduced-motion: reduce) {
    .selector { animation: none; }
    .game-prompt { animation: none; opacity: 1; }
    .nav-arrow, .game-card { transition: none; }
    .game-card { animation: none; }
  }
</style>
</head>
<body>
<div class="screen">
  <div class="marquee">
    <div class="marquee-text">OYSTER ARCADE</div>
  </div>
  <div class="tube is-ready">
    <div class="overlay"></div>
    <div class="vignette"></div>

    <div class="selector" id="selector">
      <button class="nav-arrow" id="nav-prev" type="button" aria-label="Previous game">◀</button>
      <div class="stage-grid" id="stage-grid"></div>
      <button class="nav-arrow" id="nav-next" type="button" aria-label="Next game">▶</button>

    <div class="game-frame-wrap" id="game-frame-wrap" aria-hidden="true">

      <button class="game-frame-exit" id="game-frame-exit" type="button" aria-label="Close game">×</button>
    </div>

    <div class="touch-controls" aria-hidden="true">
      <div class="tc-group">
        <button type="button" class="tc-btn" id="tc-left"  aria-label="Previous game" tabindex="-1">◀</button>
        <button type="button" class="tc-btn" id="tc-right" aria-label="Next game"     tabindex="-1">▶</button>

<script src="shared/touch.js"></script>
<script src="shared/leaderboard.js"></script>
<script>
// ============================================
// CATALOGUE — add a new game here + its preview <template> above.
// ============================================
const GAMES = [
  { id: 'rocket-ship', name: 'ROCKET SHIP', url: 'https://oyster.to/rocket-ship.html', preview: 'preview-rocket-ship' },
  { id: 'platformer',  name: 'PLATFORMER',  url: 'platformer/',                         preview: 'preview-platformer'  },
  // Placeholders so the catalogue feels populated. comingSoon entries
  // can't be launched; clicking a focused one is a no-op.
  { id: 'soon-1', name: 'COMING SOON', preview: 'preview-coming-soon', comingSoon: true },
  { id: 'soon-2', name: 'COMING SOON', preview: 'preview-coming-soon', comingSoon: true },
  { id: 'soon-3', name: 'COMING SOON', preview: 'preview-coming-soon', comingSoon: true },
];
let sel = 0;
let launched = false;

// ============================================
// CARDS — three slots (prev / focused / next). Edges of the list leave
// the outer slot empty so the focused card stays anchored to the centre.
// ============================================
function buildCard(game, idx, klass) {
  const card = document.createElement('div');
  card.className = 'game-card ' + klass;
  if (game.comingSoon) card.classList.add('is-coming-soon');
  card.dataset.idx = String(idx);

  const thumb = document.createElement('div');
  thumb.className = 'game-thumb';
  const tpl = document.getElementById(game.preview);
  if (tpl) thumb.appendChild(tpl.content.cloneNode(true));
  card.appendChild(thumb);

  const name = document.createElement('div');
  name.className = 'game-name';
  name.innerHTML = '<span class="br">[</span> ' + game.name + ' <span class="br">]</span>';
  card.appendChild(name);

  // Placeholder cards have no hi-score line — skip the empty slot entirely.
  if (!game.comingSoon) {
    const hi = document.createElement('div');
    hi.className = 'game-hi';
    if (klass === 'is-focused') hi.id = 'game-hi';
    card.appendChild(hi);
  }

  const prompt = document.createElement('div');
  prompt.className = 'game-prompt';
  if (game.comingSoon) {
    prompt.classList.add('is-soon');
    prompt.textContent = 'STAY TUNED';
  } else {
    prompt.innerHTML = '<span class="key-only">PRESS ENTER TO PLAY</span><span class="touch-only">TAP PLAY</span>';
  }
  card.appendChild(prompt);

  card.addEventListener('click', () => {
    if (idx === sel) launch();
    else { sel = idx; render(); }
  });

  return card;
}

function render() {
  const grid = document.getElementById('stage-grid');
  const n = GAMES.length;
  // Wrap-around. With ≥3 games both neighbours are distinct; with 2 games
  // we only show one neighbour to avoid the same card appearing on both
  // sides; with 1 game neither slot has a neighbour.
  let prevIdx = -1, nextIdx = -1;
  if (n >= 3) {
    prevIdx = (sel - 1 + n) % n;
    nextIdx = (sel + 1) % n;
  } else if (n === 2) {
    nextIdx = (sel + 1) % n;
  }

  grid.innerHTML = '';

  // Slot positions: prev (lower index, just-came-from) on the LEFT, next
  // (higher index, upcoming) on the RIGHT — conventional catalogue order.
  const leftSlot = document.createElement('div');
  leftSlot.className = 'stage-slot';
  if (prevIdx >= 0) leftSlot.appendChild(buildCard(GAMES[prevIdx], prevIdx, 'is-prev'));
  grid.appendChild(leftSlot);

  const centerSlot = document.createElement('div');
  centerSlot.className = 'stage-slot';
  centerSlot.appendChild(buildCard(GAMES[sel], sel, 'is-focused'));
  grid.appendChild(centerSlot);

  const rightSlot = document.createElement('div');
  rightSlot.className = 'stage-slot';
  if (nextIdx >= 0) rightSlot.appendChild(buildCard(GAMES[nextIdx], nextIdx, 'is-next'));
  grid.appendChild(rightSlot);

  paintHi();
}

function paintHi() {
  const g = GAMES[sel];
  if (g.comingSoon) return;  // no hi-score row rendered for placeholders
  Arcade.Leaderboard.init({ game: g.id, max: 10 });
  const top = Arcade.Leaderboard.getHighScore();
  const el = document.getElementById('game-hi');
  if (!el) return;
  if (!top) { el.textContent = ' '; return; }
  el.innerHTML =
    'HIGH SCORE <span class="hi-val">' + String(top.score).padStart(3, '0') + '</span> ' +
    '<span class="hi-initials">' + (top.initials || '---') + '</span>';
}

function next() { if (launched) return; sel = (sel + 1) % GAMES.length;                  render(); }
function prev() { if (launched) return; sel = (sel - 1 + GAMES.length) % GAMES.length;   render(); }

render();

// ============================================
// LAUNCH / CLOSE
// ============================================
const tube = document.querySelector('.tube');
const wrap = document.getElementById('game-frame-wrap');
const frame = document.getElementById('game-frame');
const exit = document.getElementById('game-frame-exit');

function launch() {
  if (launched) return;
  const g = GAMES[sel];
  if (g.comingSoon) return;  // placeholder — no game to launch yet
  launched = true;
  frame.src = g.url;
  wrap.classList.remove('is-shutting-down');
  wrap.classList.add('is-launched', 'is-launching');
  wrap.setAttribute('aria-hidden', 'false');
  tube.classList.add('is-game-launched');
  document.body.classList.add('is-game-launched');
  setTimeout(() => wrap.classList.remove('is-launching'), 600);
  setTimeout(() => { try { frame.focus(); } catch (_) {} }, 60);
}

function close() {
  if (!launched) return;
  launched = false;
  wrap.classList.add('is-shutting-down');
  setTimeout(() => {
    wrap.classList.remove('is-launched', 'is-shutting-down', 'is-launching');
    wrap.setAttribute('aria-hidden', 'true');
    tube.classList.remove('is-game-launched');
    document.body.classList.remove('is-game-launched');
    try { frame.src = 'about:blank'; } catch (_) {}
    paintHi();
    Arcade.Leaderboard.init({ game: GAMES[sel].id, max: 10 });
    Arcade.Leaderboard.refresh().then(paintHi);
  }, 720);
}

exit.addEventListener('click', close);

window.addEventListener('keydown', e => {
  if (e.key === 'Escape' && launched) { close(); e.preventDefault(); }
});

window.addEventListener('message', e => {
  if (!e || !e.data) return;
  if (frame && e.source !== frame.contentWindow) return;
  const t = e.data.type;
  if (t === 'arcade-close' || t === 'oyster-rocket-close') close();
});

// ============================================
// INPUT — keyboard, on-screen arrows, touch buttons.
// ============================================
window.addEventListener('keydown', e => {
  if (launched) return;
  if      (e.key === 'ArrowLeft'  || e.key === 'a' || e.key === 'A') { prev();   e.preventDefault(); }
  else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') { next();   e.preventDefault(); }
  else if (e.key === 'Enter'      || e.key === ' ')                  { launch(); e.preventDefault(); }
});
document.getElementById('nav-prev').addEventListener('click', prev);
document.getElementById('nav-next').addEventListener('click', next);
Arcade.Touch.bind(document.getElementById('tc-left'),   prev,   () => {});
Arcade.Touch.bind(document.getElementById('tc-right'),  next,   () => {});
Arcade.Touch.bind(document.getElementById('tc-select'), launch, () => {});

// ============================================
// LEADERBOARD preload — serial because the singleton module isn't safe
// for concurrent inits.
// ============================================
(async () => {
  for (const g of GAMES) {
    if (g.comingSoon) continue;
    Arcade.Leaderboard.init({ game: g.id, max: 10 });
    try { await Arcade.Leaderboard.refresh(); } catch (_) {}
    if (GAMES[sel].id === g.id) paintHi();
  }
})();
</script>
